<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Log Viewer</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    body {
      background: #050505; color: #b0b0b0;
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      margin: 0; padding: 10px; height: 100vh; overflow: hidden;
      display: flex; flex-direction: column;
    }
    #log-container {
      flex: 1; overflow-y: auto; white-space: pre-wrap; word-break: break-all;
      padding-bottom: 20px;
    }
    .log-line { margin-bottom: 2px; }
    .status-bar {
      border-top: 1px solid #222; padding-top: 5px;
      display: flex; justify-content: space-between; color: #666;
    }
  </style>
</head>
<body>
  <div id="log-container"></div>
  <div class="status-bar">
    <span>Live Logs</span>
    <span id="status">Connecting...</span>
  </div>

  <script>
    const container = document.getElementById('log-container');
    const status = document.getElementById('status');
    let es = null;

    function connect() {
      if(es) es.close();
      es = new EventSource('/api/logs');

      es.onopen = () => {
        status.innerText = "Connected";
        status.style.color = "#10B981";
      };

      es.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data);
          const line = document.createElement('div');
          line.className = 'log-line';
          line.innerText = data.log;
          container.appendChild(line);

          // Auto-scroll
          container.scrollTop = container.scrollHeight;

          // Limit lines
          if(container.children.length > 500) {
            container.removeChild(container.firstChild);
          }
        } catch(err) {}
      };

      es.onerror = () => {
        status.innerText = "Disconnected";
        status.style.color = "#EF4444";
        es.close();
        setTimeout(connect, 3000);
      };
    }

    connect();
  </script>
</body>
</html>
