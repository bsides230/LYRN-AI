<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Model Controller</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-core: #050505; --bg-panel: #0a0a0a; --bg-input: #111;
      --brand-purple: #7c5cff; --text-head: #ffffff; --text-body: #b0b0b0;
      --border-color: #222; --success: #10B981; --error: #EF4444;
      --font-base: 12px;
    }
    body {
      background: var(--bg-core); color: var(--text-body);
      font-family: 'Inter', sans-serif; font-size: var(--font-base);
      margin: 0; padding: 20px;
    }
    h2 { font-family: 'JetBrains Mono'; color: var(--text-head); margin-bottom: 20px; }

    .card { background: var(--bg-panel); border: 1px solid var(--border-color); padding: 15px; border-radius: 4px; margin-bottom: 20px; }
    .row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
    label { width: 100px; font-family: 'JetBrains Mono'; color: var(--text-dim); }
    input[type="text"], input[type="number"] {
      background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-head);
      padding: 8px; font-family: 'JetBrains Mono'; flex: 1;
    }

    button {
      background: rgba(255,255,255,0.05); border: 1px solid var(--border-color);
      color: var(--text-head); padding: 8px 16px; cursor: pointer;
      font-family: 'JetBrains Mono'; text-transform: uppercase;
    }
    button:hover { border-color: var(--brand-purple); color: var(--brand-purple); }
    .btn-primary { background: var(--brand-purple); border-color: var(--brand-purple); }
    .btn-primary:hover { background: #6a4ce0; color: #fff; }

    .status-indicator {
      display: inline-block; width: 10px; height: 10px; border-radius: 50%;
      background: #444; margin-right: 8px;
    }
    .status-loaded { background: var(--success); box-shadow: 0 0 8px var(--success); }
  </style>
</head>
<body>
  <h2>Model Controller</h2>

  <div class="card">
    <div class="row">
      <span class="status-indicator" id="status-dot"></span>
      <span id="status-text" style="font-family:'JetBrains Mono'">Not Loaded</span>
    </div>
  </div>

  <div class="card">
    <div class="row"><label>Path</label><input type="text" id="m-path" placeholder="/path/to/model.gguf"></div>
    <div class="row"><label>Ctx Size</label><input type="number" id="m-ctx" value="8192"></div>
    <div class="row"><label>Threads</label><input type="number" id="m-threads" value="8"></div>
    <div class="row"><label>GPU Layers</label><input type="number" id="m-gpu" value="0"></div>

    <div class="row" style="margin-top: 20px; justify-content: flex-end;">
      <button onclick="unloadModel()">Unload</button>
      <button class="btn-primary" onclick="loadModel()">Load</button>
    </div>
  </div>

  <script>
    async function refreshStatus() {
      try {
        const res = await fetch('/api/model/status');
        const data = await res.json();
        const dot = document.getElementById('status-dot');
        const text = document.getElementById('status-text');

        if(data.loaded) {
          dot.classList.add('status-loaded');
          text.innerText = "Active: " + data.model_path.split(/[\\/]/).pop();
        } else {
          dot.classList.remove('status-loaded');
          text.innerText = "No Model Loaded";
        }
      } catch(e) {}
    }

    async function loadConfig() {
      try {
        const res = await fetch('/api/config');
        const data = await res.json();
        const act = data.active;
        document.getElementById('m-path').value = act.model_path || "";
        document.getElementById('m-ctx').value = act.n_ctx || 8192;
        document.getElementById('m-threads').value = act.n_threads || 8;
        document.getElementById('m-gpu').value = act.n_gpu_layers || 0;
      } catch(e) {}
    }

    async function loadModel() {
      const payload = {
        model_path: document.getElementById('m-path').value,
        n_ctx: parseInt(document.getElementById('m-ctx').value),
        n_threads: parseInt(document.getElementById('m-threads').value),
        n_gpu_layers: parseInt(document.getElementById('m-gpu').value)
      };

      const btn = document.querySelector('.btn-primary');
      btn.innerText = "Loading...";
      btn.disabled = true;

      try {
        // Also update config
        await fetch('/api/config', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                active: payload
            })
        });

        const res = await fetch('/api/model/load', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(payload)
        });
        if(res.ok) {
            refreshStatus();
        } else {
            alert("Failed to load");
        }
      } catch(e) { alert(e); }

      btn.innerText = "Load";
      btn.disabled = false;
    }

    async function unloadModel() {
      await fetch('/api/model/unload', {method: 'POST'});
      refreshStatus();
    }

    loadConfig();
    refreshStatus();
    setInterval(refreshStatus, 5000);
  </script>
</body>
</html>
