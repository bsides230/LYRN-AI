<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>System Monitor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-core: #050505;
      --bg-panel: #0a0a0a;
      --brand-purple: #7c5cff;
      --text-head: #ffffff;
      --text-body: #b0b0b0;
      --border-color: #222222;
      --font-base: 12px;
    }
    body {
      background: var(--bg-core); color: var(--text-body);
      font-family: 'Inter', sans-serif; font-size: var(--font-base);
      margin: 0; padding: 20px;
    }
    h2 { font-family: 'JetBrains Mono', monospace; color: var(--text-head); margin: 0 0 20px 0; }

    .monitor-grid { display: flex; flex-direction: column; gap: 15px; }
    .monitor-row { background: var(--bg-panel); padding: 10px; border: 1px solid var(--border-color); border-radius: 4px; }
    .label-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-family: 'JetBrains Mono'; }
    .bar-bg { background: #222; height: 8px; border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; width: 0%; transition: width 0.5s ease; }

    .cpu-fill { background: #F59E0B; }
    .ram-fill { background: #3B82F6; }
    .vram-fill { background: #EF4444; }
    .disk-fill { background: #10B981; }
  </style>
</head>
<body>
  <h2>System Resources</h2>
  <div class="monitor-grid">
    <div class="monitor-row">
      <div class="label-row"><span>CPU</span><span id="cpu-val">0%</span></div>
      <div class="bar-bg"><div class="bar-fill cpu-fill" id="cpu-bar"></div></div>
    </div>
    <div class="monitor-row">
      <div class="label-row"><span>RAM</span><span id="ram-val">0 / 0 GB</span></div>
      <div class="bar-bg"><div class="bar-fill ram-fill" id="ram-bar"></div></div>
    </div>
    <div class="monitor-row">
      <div class="label-row"><span>VRAM</span><span id="vram-val">0 / 0 GB</span></div>
      <div class="bar-bg"><div class="bar-fill vram-fill" id="vram-bar"></div></div>
    </div>
    <div class="monitor-row">
      <div class="label-row"><span>Disk</span><span id="disk-val">0 / 0 GB</span></div>
      <div class="bar-bg"><div class="bar-fill disk-fill" id="disk-bar"></div></div>
    </div>
  </div>

  <script>
    async function update() {
      try {
        const res = await fetch('/api/system/status');
        const data = await res.json();

        document.getElementById('cpu-val').innerText = `${data.cpu}% (${data.cpu_temp})`;
        document.getElementById('cpu-bar').style.width = `${data.cpu}%`;

        document.getElementById('ram-val').innerText = `${data.ram_used_gb.toFixed(1)} / ${data.ram_total_gb.toFixed(1)} GB`;
        document.getElementById('ram-bar').style.width = `${data.ram_percent}%`;

        document.getElementById('vram-val').innerText = `${data.vram_used_gb.toFixed(1)} / ${data.vram_total_gb.toFixed(1)} GB`;
        document.getElementById('vram-bar').style.width = `${data.vram_percent}%`;

        document.getElementById('disk-val').innerText = `${data.disk_used_gb.toFixed(1)} / ${data.disk_total_gb.toFixed(1)} GB`;
        document.getElementById('disk-bar').style.width = `${data.disk_percent}%`;
      } catch(e) { console.error(e); }
    }
    setInterval(update, 2000);
    update();
  </script>
</body>
</html>
