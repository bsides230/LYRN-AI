<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LYRN Chat Interface (Module)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
    /* [ ... CORE VARIABLES ... ] */
    :root {
      --bg-core: #050505;
      --bg-panel: #0a0a0a;
      --bg-input: #050505;
      --brand-purple: #7c5cff;
      --brand-purple-dim: rgba(124, 92, 255, 0.1);
      --text-head: #ffffff;
      --text-body: #b0b0b0;
      --text-dim: #666666;
      --border-color: #222222;
      --input-focus-bg: #111111;
      --success-color: #10B981;
      --error-color: #EF4444;

      --btn-text: #e0e0e0;
      --btn-border: #444444;
      --btn-bg: rgba(255,255,255,0.03);
      --msg-user-bg: #111111;
      --msg-assistant-bg: #0a0a0a;

      /* TYPOGRAPHY */
      --font-size-base: 13px;
    }

    body[data-theme="light"] {
        --bg-core: #eef0f4;
        --bg-panel: #ffffff;
        --bg-input: #ffffff;
        --brand-purple: #6a4ce0;
        --brand-purple-dim: rgba(106, 76, 224, 0.1);
        --text-head: #111111;
        --text-body: #333333;
        --text-dim: #555555;
        --border-color: #d1d5db;
        --input-focus-bg: #f9fafb;
        --btn-text: #333;
        --btn-border: #ccc;
        --btn-bg: rgba(0,0,0,0.03);
        --msg-user-bg: #e5e7eb;
        --msg-assistant-bg: #ffffff;
    }

    * { box-sizing: border-box; }

    /* --- THEMED SCROLLBARS --- */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; border: 2px solid transparent; background-clip: content-box; }
    ::-webkit-scrollbar-thumb:hover { background-color: var(--brand-purple); }

    body {
      margin: 0; padding: 0;
      background-color: var(--bg-core); color: var(--text-body);
      font-family: 'Inter', system-ui, sans-serif;
      height: 100vh; width: 100vw; overflow: hidden;
      font-size: var(--font-size-base);
    }

    h1, h2, h3, h4 { font-family: 'JetBrains Mono', monospace; color: var(--text-head); margin: 0; }

    /* UI ELEMENTS */
    button {
      font-family: 'JetBrains Mono', monospace;
      font-size: calc(var(--font-size-base) - 1px);
      background: var(--btn-bg);
      border: 1px solid var(--btn-border); color: var(--btn-text); padding: 8px 12px;
      cursor: pointer; text-transform: uppercase; letter-spacing: 0.1em; transition: all 0.2s ease; border-radius: 4px;
      white-space: nowrap; display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    button:hover { border-color: var(--brand-purple); color: var(--brand-purple); }
    button.btn-primary { background: var(--brand-purple); color: #ffffff; border-color: var(--brand-purple); font-weight: 600; }
    button.btn-primary:hover { background: #6a4ce0; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-group { display: flex; align-items: center; gap: 8px; }
    .btn-square { width: 32px; height: 32px; padding: 0; font-size: calc(var(--font-size-base) + 4px); }

    .hidden { display: none !important; }

    /* LAYOUT */
    .app-wrapper {
      background: var(--bg-core);
      height: 100vh; width: 100%;
      display: flex; flex-direction: column; position: relative;
    }

    header {
      border-bottom: 1px solid var(--border-color); padding: 12px 16px;
      display: flex; justify-content: space-between; align-items: center;
      background: var(--bg-panel); flex-shrink: 0;
    }

    .meta-label { font-family: 'JetBrains Mono'; font-size: calc(var(--font-size-base) - 2px); color: var(--brand-purple); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; display: block; }
    .panel-title { font-size: calc(var(--font-size-base) + 2px); font-weight: 600; }

    /* CHAT AREA */
    .chat-container {
        flex: 1; overflow-y: auto; padding: 20px;
        display: flex; flex-direction: column; gap: 15px;
        scroll-behavior: smooth;
    }

    .message-row {
        display: flex; width: 100%;
    }
    .message-row.user { justify-content: flex-end; }
    .message-row.assistant { justify-content: flex-start; }

    .message-bubble {
        max-width: 80%;
        padding: 12px 16px;
        border-radius: 8px;
        font-family: 'JetBrains Mono', monospace;
        line-height: 1.5;
        white-space: pre-wrap;
        border: 1px solid var(--border-color);
    }

    .message-row.user .message-bubble {
        background: var(--msg-user-bg);
        border-color: var(--border-color);
        color: var(--text-head);
    }
    .message-row.assistant .message-bubble {
        background: var(--msg-assistant-bg);
        border-color: var(--border-color);
        color: var(--text-body);
    }

    .typing-indicator {
        font-style: italic; color: var(--brand-purple); font-size: 11px; margin-top: 5px;
    }

    /* INPUT AREA */
    .input-area {
        padding: 20px; background: var(--bg-panel); border-top: 1px solid var(--border-color);
        display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0;
    }

    textarea {
      flex: 1; background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-head); padding: 12px; font-family: 'JetBrains Mono', monospace; font-size: var(--font-size-base); border-radius: 4px; resize: none; min-height: 50px; max-height: 200px;
    }
    textarea:focus { border-color: var(--brand-purple); outline: none; background: var(--input-focus-bg); }

    /* TOAST */
    #toast {
        position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
        background: var(--bg-panel); border: 1px solid var(--brand-purple);
        color: var(--text-head); padding: 10px 20px; border-radius: 4px;
        font-family: 'JetBrains Mono', monospace; font-size: var(--font-size-base);
        opacity: 0; pointer-events: none; transition: opacity 0.3s;
        box-shadow: 0 10px 30px rgba(0,0,0,0.8); z-index: 11000;
    }
    #toast.show { opacity: 1; }

    /* FOOTER */
    .footer-bar { padding: 8px 16px; border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; background: var(--bg-panel); font-size: calc(var(--font-size-base) - 2px); font-family: 'JetBrains Mono'; color: var(--text-dim); flex-shrink: 0; }

  </style>
</head>
<body>

  <div class="app-wrapper">
    <header>
        <div>
            <div class="meta-label">LYRN SYSTEM MODULE</div>
            <h1 class="panel-title">Chat Interface</h1>
        </div>
        <div class="btn-group">
            <span id="api-status" style="font-family:'JetBrains Mono'; font-size:10px; color:var(--text-dim); margin-right:10px;">Checking API...</span>
            <input type="file" id="file-input" style="display: none;" accept=".json" onchange="handleFileLoad(this)">
            <button onclick="document.getElementById('file-input').click()">Import Config</button>
            <button class="btn-icon btn-square" onclick="clearChat()" title="Clear Chat">🗑️</button>
        </div>
    </header>

    <div class="chat-container" id="chat-history">
        <div style="text-align: center; color: var(--text-dim); margin-top: 40px;">
            <p>Welcome to LYRN Chat.</p>
            <p style="font-size: 11px;">Configure API endpoint in Settings or import config here.</p>
        </div>
    </div>

    <div class="input-area">
        <textarea id="chat-input" placeholder="Type a message... (Ctrl+Enter to send)"></textarea>
        <button class="btn-primary" style="height: 50px; width: 80px;" onclick="sendMessage()" id="send-btn">SEND</button>
    </div>

    <div class="footer-bar">
         <span>CHAT INTERFACE // V1.0</span>
         <span id="endpoint-display">...</span>
    </div>
  </div>

  <div id="toast">Operation Successful</div>

  <script>
    /* =========================================
       GLOBAL STATE
       ========================================= */
    let CONFIG = {
        apiUrl: "http://localhost:8000/api/chat"
    };

    let isProcessing = false;

    document.addEventListener('DOMContentLoaded', () => {
        // Init logic
        loadConfig();

        // Input binding
        const input = document.getElementById('chat-input');
        input.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                sendMessage();
            }
        });

        // Theme Sync
        window.addEventListener('message', (event) => {
            if (event.data.type === 'THEME_CHANGE') {
                document.body.setAttribute('data-theme', event.data.theme);
            }
            if (event.data.type === 'FONT_CHANGE') {
                document.documentElement.style.setProperty('--font-size-base', event.data.fontSize + 'px');
            }
            if (event.data.type === 'CORE_URL_CHANGE') {
                // Remove trailing slash if present then append endpoint
                const base = event.data.url.replace(/\/$/, "");
                CONFIG.apiUrl = base + '/api/chat';
                updateStatusDisplay();
            }
        });
    });

    function showToast(msg, error=false) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.borderColor = error ? 'var(--error-color)' : 'var(--brand-purple)';
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    /* =========================================
       CONFIG & API
       ========================================= */
    function loadConfig() {
        // 1. Try LocalStorage
        try {
            const stored = localStorage.getItem('lyrn_api_config');
            if (stored) {
                const map = JSON.parse(stored);
                if (map["Chat"]) {
                    CONFIG.apiUrl = map["Chat"];
                    console.log("Loaded API URL from LocalStorage:", CONFIG.apiUrl);
                }
            }
        } catch (e) { console.warn("LocalStorage access failed", e); }

        updateStatusDisplay();
    }

    function handleFileLoad(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const json = JSON.parse(e.target.result);
                if (json["Chat"]) {
                    CONFIG.apiUrl = json["Chat"];
                    updateStatusDisplay();
                    showToast("Config Loaded");
                } else {
                    showToast("No 'Chat' endpoint in config", true);
                }
            } catch (err) { showToast("Invalid JSON", true); }
        };
        reader.readAsText(file);
        input.value = '';
    }

    function updateStatusDisplay() {
        document.getElementById('endpoint-display').innerText = `API: ${CONFIG.apiUrl}`;
        // Simple connectivity check (optional)
        document.getElementById('api-status').innerText = "Ready";
    }

    /* =========================================
       CHAT LOGIC
       ========================================= */
    async function sendMessage() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text || isProcessing) return;

        // Clear input
        input.value = '';
        isProcessing = true;
        document.getElementById('send-btn').disabled = true;

        // UI: Add User Message
        appendMessage('user', text);

        // UI: Add Placeholder for Assistant
        const responseId = appendMessage('assistant', '', true); // true = loading state
        const responseBubble = document.getElementById(responseId).querySelector('.message-bubble');

        try {
            const response = await fetch(CONFIG.apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });

            if (!response.ok) throw new Error(`Server Error: ${response.status}`);

            // Remove loading indicator & start streaming
            responseBubble.classList.remove('typing');
            responseBubble.innerText = "";

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let accumulated = "";
            let buffer = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });

                let newlineIdx = buffer.indexOf('\n');
                while (newlineIdx !== -1) {
                    const line = buffer.substring(0, newlineIdx);
                    buffer = buffer.substring(newlineIdx + 1);

                    if (line.trim()) {
                        try {
                            const j = JSON.parse(line);
                            if (j.response) {
                                accumulated += j.response;
                                responseBubble.innerText = accumulated;
                            }
                        } catch (e) {
                            console.warn("JSON Parse Error:", e, line);
                        }
                    }
                    newlineIdx = buffer.indexOf('\n');
                }

                // Scroll
                const history = document.getElementById('chat-history');
                history.scrollTop = history.scrollHeight;
            }

        } catch (err) {
            console.error("Chat Error:", err);
            responseBubble.classList.remove('typing');

            let errorMsg = `Error: ${err.message}`;
            if (err.name === 'TypeError' && err.message.includes('fetch')) {
                errorMsg = `Connection Failed. Check URL: ${CONFIG.apiUrl}`;
            }

            responseBubble.innerText = errorMsg;
            responseBubble.style.color = 'var(--error-color)';
        } finally {
            isProcessing = false;
            document.getElementById('send-btn').disabled = false;
            input.focus();
        }
    }

    function appendMessage(role, text, isLoading=false) {
        const history = document.getElementById('chat-history');
        // Clear welcome message if it's the first real message
        if (history.children.length === 1 && history.children[0].style.textAlign === 'center') {
            history.innerHTML = '';
        }

        const id = 'msg-' + Date.now();
        const row = document.createElement('div');
        row.className = `message-row ${role}`;
        row.id = id;

        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        if (isLoading) {
            bubble.classList.add('typing');
            bubble.innerText = 'Thinking...';
            bubble.style.color = 'var(--brand-purple)';
            bubble.style.fontStyle = 'italic';
        } else {
            bubble.innerText = text;
        }

        row.appendChild(bubble);
        history.appendChild(row);

        // Scroll to bottom
        setTimeout(() => history.scrollTop = history.scrollHeight, 10);

        return id;
    }

    function clearChat() {
        const history = document.getElementById('chat-history');
        history.innerHTML = `
            <div style="text-align: center; color: var(--text-dim); margin-top: 40px;">
                <p>Chat Cleared.</p>
            </div>
        `;
    }

  </script>
</body>
</html>
