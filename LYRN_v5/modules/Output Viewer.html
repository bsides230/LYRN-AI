<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Output Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg-core:          #050505;
            --bg-panel:         #0a0a0a;
            --bg-block:         #0f0f0f;
            --brand-purple:     #7c5cff;
            --brand-purple-dim: rgba(124,92,255,0.12);
            --text-head:        #ffffff;
            --text-body:        #b0b0b0;
            --text-dim:         #444444;
            --text-internal:    #666666;
            --border-color:     #1e1e1e;
            --marker-color:     #f59e0b;
            --marker-bg:        rgba(245,158,11,0.08);
            --live-dot:         #10b981;
            --idle-dot:         #444444;
        }
        body[data-theme="light"] {
            --bg-core:          #eef0f4;
            --bg-panel:         #ffffff;
            --bg-block:         #f5f5f7;
            --brand-purple:     #6a4ce0;
            --brand-purple-dim: rgba(106,76,224,0.1);
            --text-head:        #111111;
            --text-body:        #333333;
            --text-dim:         #aaaaaa;
            --text-internal:    #888888;
            --border-color:     #d1d5db;
            --marker-color:     #d97706;
            --marker-bg:        rgba(217,119,6,0.08);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--brand-purple); }

        body {
            background: var(--bg-core);
            color: var(--text-body);
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px 8px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }
        .header-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--text-head);
            flex: 1;
        }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--idle-dot);
            transition: background 0.3s;
        }
        .status-dot.live { background: var(--live-dot); box-shadow: 0 0 6px var(--live-dot); }
        .status-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 0.08em;
        }
        .btn-sm {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-body);
            padding: 3px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.15s, color 0.15s;
        }
        .btn-sm:hover { border-color: var(--brand-purple); color: var(--text-head); }

        /* ── Tabs ── */
        .tabs {
            display: flex;
            gap: 2px;
            padding: 8px 16px 0;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }
        .tab {
            padding: 5px 12px;
            cursor: pointer;
            font-size: 11px;
            color: var(--text-dim);
            border-bottom: 2px solid transparent;
            transition: color 0.15s, border-color 0.15s;
            user-select: none;
        }
        .tab.active { color: var(--brand-purple); border-bottom-color: var(--brand-purple); }
        .tab:hover:not(.active) { color: var(--text-body); }

        /* ── Panels ── */
        .panel { flex: 1; overflow: hidden; display: none; }
        .panel.active { display: flex; flex-direction: column; }

        /* ── Live Panel ── */
        .live-meta {
            padding: 10px 16px 6px;
            font-size: 11px;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
            min-height: 28px;
        }
        .live-meta .user-msg { color: var(--text-body); }
        .live-output {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
        }
        /* pre-marker text — internal reasoning */
        .chunk-internal { color: var(--text-internal); }
        /* the marker line itself */
        .marker-line {
            display: block;
            color: var(--marker-color);
            background: var(--marker-bg);
            padding: 2px 6px;
            border-radius: 3px;
            margin: 4px 0;
            font-weight: 500;
        }
        /* post-marker text — what the user sees */
        .chunk-final { color: var(--text-body); }

        /* ── History Panel ── */
        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }
        .history-entry {
            border-bottom: 1px solid var(--border-color);
            padding: 10px 16px;
            cursor: pointer;
            transition: background 0.12s;
        }
        .history-entry:hover { background: var(--brand-purple-dim); }
        .history-entry.expanded { background: var(--bg-block); }
        .h-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }
        .h-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--text-dim);
            flex-shrink: 0;
        }
        .h-user {
            font-size: 11px;
            color: var(--text-head);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .h-badge {
            font-size: 9px;
            padding: 1px 5px;
            border-radius: 3px;
            flex-shrink: 0;
        }
        .h-badge.af { background: var(--marker-bg); color: var(--marker-color); }
        .h-badge.full { background: var(--brand-purple-dim); color: var(--brand-purple); }
        .h-body {
            display: none;
            margin-top: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            line-height: 1.65;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 300px;
            overflow-y: auto;
        }
        .history-entry.expanded .h-body { display: block; }
        .h-internal { color: var(--text-internal); }
        .h-marker { color: var(--marker-color); }
        .h-final { color: var(--text-body); }

        .empty-state {
            color: var(--text-dim);
            text-align: center;
            padding: 40px 16px;
            font-size: 11px;
        }
    </style>
</head>
<body>

<div class="header">
    <span class="header-title">OUTPUT VIEWER</span>
    <span class="status-dot" id="statusDot"></span>
    <span class="status-label" id="statusLabel">IDLE</span>
    <button class="btn-sm" id="clearBtn" title="Clear history">Clear</button>
</div>

<div class="tabs">
    <div class="tab active" data-tab="live">Live</div>
    <div class="tab" data-tab="history">History</div>
</div>

<!-- Live Panel -->
<div class="panel active" id="panel-live">
    <div class="live-meta" id="liveMeta">Waiting for generation...</div>
    <div class="live-output" id="liveOutput"></div>
</div>

<!-- History Panel -->
<div class="panel" id="panel-history">
    <div class="history-list" id="historyList">
        <div class="empty-state">No history yet.</div>
    </div>
</div>

<script>
    /* ── State ── */
    let coreUrl    = 'http://localhost:8080';
    let authToken  = '';
    let liveEs     = null;      // EventSource for raw stream
    let pollTimer  = null;
    let isLive     = false;
    const MARKER   = '##AF: FINAL_OUTPUT##';

    /* ── Theme / Config messages from dashboard ── */
    window.addEventListener('message', e => {
        if (e.data.type === 'THEME_CHANGE')   document.body.setAttribute('data-theme', e.data.theme);
        if (e.data.type === 'FONT_CHANGE')    document.documentElement.style.setProperty('--font-size-base', e.data.fontSize + 'px');
        if (e.data.type === 'CORE_URL_CHANGE') { coreUrl = e.data.url; init(); }
        if (e.data.type === 'TOKEN_UPDATE')   { authToken = e.data.token; init(); }
    });

    /* ── Tabs ── */
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
            if (tab.dataset.tab === 'history') loadHistory();
        });
    });

    /* ── Clear ── */
    document.getElementById('clearBtn').addEventListener('click', async () => {
        if (!confirm('Clear output history?')) return;
        try {
            await fetch(`${coreUrl}/api/output/log`, {
                method: 'DELETE',
                headers: authToken ? { 'Authorization': `Bearer ${authToken}` } : {}
            });
        } catch {}
        document.getElementById('historyList').innerHTML = '<div class="empty-state">No history yet.</div>';
    });

    /* ── Status polling ── */
    function startStatusPoll() {
        if (pollTimer) clearInterval(pollTimer);
        pollTimer = setInterval(checkStatus, 1000);
    }

    async function checkStatus() {
        try {
            const h = authToken ? { 'Authorization': `Bearer ${authToken}` } : {};
            const r = await fetch(`${coreUrl}/api/chat/stream_status`, { headers: h });
            if (!r.ok) return;
            const d = await r.json();
            const busy = d.processing || d.final_output_active;
            setStatus(busy);
            if (busy && !isLive) startLiveStream();
        } catch {}
    }

    function setStatus(live) {
        const dot   = document.getElementById('statusDot');
        const label = document.getElementById('statusLabel');
        if (live) {
            dot.classList.add('live');
            label.textContent = 'LIVE';
        } else {
            dot.classList.remove('live');
            label.textContent = 'IDLE';
        }
    }

    /* ── Live streaming ── */
    function startLiveStream() {
        if (liveEs) { liveEs.close(); liveEs = null; }
        isLive = true;

        // Reset live panel
        document.getElementById('liveMeta').innerHTML = '<span>Generating...</span>';
        document.getElementById('liveOutput').innerHTML = '';

        const url = `${coreUrl}/api/output/raw_stream` +
                    (authToken ? `?token=${encodeURIComponent(authToken)}` : '');

        // Fetch user message to show in meta
        const h = authToken ? { 'Authorization': `Bearer ${authToken}` } : {};
        fetch(`${coreUrl}/api/chat/status`, { headers: h })
            .then(r => r.json())
            .then(d => {
                // status doesn't have user message — we'll fill it from the stream
            }).catch(() => {});

        let accumulated  = '';   // full raw text so far
        let pastMarker   = false;
        const out        = document.getElementById('liveOutput');
        out.innerHTML    = '';

        liveEs = new EventSource(url);

        liveEs.onmessage = e => {
            const msg = JSON.parse(e.data);
            if (msg.done) {
                liveEs.close();
                liveEs = null;
                isLive = false;
                setStatus(false);
                // Refresh history tab if it's active
                const histTab = document.querySelector('.tab[data-tab="history"]');
                if (histTab && histTab.classList.contains('active')) loadHistory();
                return;
            }
            if (!msg.text) return;

            accumulated += msg.text;

            // Re-render live output by splitting at the marker
            renderLive(out, accumulated);
        };

        liveEs.onerror = () => {
            if (liveEs) { liveEs.close(); liveEs = null; }
            isLive = false;
            setStatus(false);
        };
    }

    function renderLive(container, text) {
        container.innerHTML = '';

        if (!text.includes(MARKER)) {
            // All internal so far
            const span = document.createElement('span');
            span.className = 'chunk-internal';
            span.textContent = text;
            container.appendChild(span);
        } else {
            const [before, after] = text.split(MARKER);

            if (before) {
                const span = document.createElement('span');
                span.className = 'chunk-internal';
                span.textContent = before;
                container.appendChild(span);
            }

            const marker = document.createElement('span');
            marker.className = 'marker-line';
            marker.textContent = MARKER;
            container.appendChild(marker);

            if (after) {
                const span = document.createElement('span');
                span.className = 'chunk-final';
                span.textContent = after;
                container.appendChild(span);

                // Update meta with first line of final output as preview
                const firstLine = after.trim().split('\n')[0];
                if (firstLine) {
                    document.getElementById('liveMeta').innerHTML =
                        `<span style="color:var(--text-dim)">→ user: </span>` +
                        `<span class="user-msg">${escHtml(firstLine.slice(0, 120))}</span>`;
                }
            }
        }

        // Auto-scroll
        container.scrollTop = container.scrollHeight;
    }

    /* ── History ── */
    async function loadHistory() {
        try {
            const h = authToken ? { 'Authorization': `Bearer ${authToken}` } : {};
            const r = await fetch(`${coreUrl}/api/output/log`, { headers: h });
            if (!r.ok) return;
            const d = await r.json();
            renderHistory(d.entries || []);
        } catch (err) {
            document.getElementById('historyList').innerHTML =
                `<div class="empty-state">Error loading history.</div>`;
        }
    }

    function renderHistory(entries) {
        const list = document.getElementById('historyList');
        if (!entries.length) {
            list.innerHTML = '<div class="empty-state">No history yet.</div>';
            return;
        }
        list.innerHTML = '';
        entries.forEach((entry, i) => {
            const div = document.createElement('div');
            div.className = 'history-entry';

            const badgeClass = entry.marker_detected ? 'af' : 'full';
            const badgeLabel = entry.marker_detected ? '##AF##' : 'RAW';
            const ts = entry.timestamp ? entry.timestamp.split('T')[1] : '??:??:??';

            // Build the body split at the marker
            let bodyHtml = '';
            const raw = entry.raw_output || '';
            if (entry.marker_detected && raw.includes(MARKER)) {
                const [pre, post] = raw.split(MARKER);
                if (pre.trim()) bodyHtml += `<span class="h-internal">${escHtml(pre.trim())}</span>`;
                bodyHtml += `\n<span class="h-marker">${escHtml(MARKER)}</span>\n`;
                if (post.trim()) bodyHtml += `<span class="h-final">${escHtml(post.trim())}</span>`;
            } else {
                bodyHtml += `<span class="h-final">${escHtml(raw.trim())}</span>`;
            }

            div.innerHTML = `
                <div class="h-meta">
                    <span class="h-time">${escHtml(ts)}</span>
                    <span class="h-user">${escHtml(entry.user_message || '—')}</span>
                    <span class="h-badge ${badgeClass}">${badgeLabel}</span>
                </div>
                <div class="h-body">${bodyHtml}</div>`;

            div.addEventListener('click', () => div.classList.toggle('expanded'));
            list.appendChild(div);
        });
    }

    function escHtml(s) {
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    /* ── Boot ── */
    function init() {
        startStatusPoll();
        loadHistory();
    }

    // Try to grab config from localStorage (same keys as dashboard)
    try {
        const cu = localStorage.getItem('lyrn_core_url');
        if (cu) coreUrl = cu;
        const tk = localStorage.getItem('lyrn_admin_token');
        if (tk) authToken = tk;
    } catch {}

    init();
</script>
</body>
</html>
