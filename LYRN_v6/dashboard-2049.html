<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LYRN Corporate 2049</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

    <style>
        /* 2049 CSS Variables and Styles */
        :root {
            /* Core Colors */
            --bg-base: #0a0e12;
            --bg-glass: rgba(15, 20, 25, 0.6);
            --bg-panel: rgba(10, 15, 20, 0.85);

            /* Accent Colors */
            --accent-cyan: #00ffff;
            --accent-white: #ffffff;
            --accent-darkgrey: #4a4a4a;
            --accent-purple: #7c5cff;
            --accent-lime: #a3ff00;
            --accent-orange: #ff7700;
            --accent-lemon: #ffee00;

            /* Current Accent */
            --current-accent: var(--accent-cyan);

            /* Text */
            --text-main: #e0e0e0;
            --text-dim: #8899aa;

            /* Fonts */
            --font-ui: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;

            --border-glow: rgba(0, 255, 255, 0.3); /* Will be updated via JS */
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0; width: 100vw; min-height: 100vh; overflow: hidden;
            background-color: var(--bg-base);
            font-family: var(--font-ui);
            color: var(--text-main);
            /* Sci-Fi Background */
            background-image:
                radial-gradient(circle at 50% 50%, rgba(0,0,0,0) 0%, rgba(0,0,0,0.8) 100%),
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.02) 2px, rgba(255,255,255,0.02) 4px);
            user-select: none;
        }

        /* Ambient Telemetry (Background) */
        #hud-background {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 0;
            pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 20px;
        }

        .hud-corner {
            font-family: var(--font-mono); font-size: 10px; color: var(--text-dim);
            opacity: 0.6; text-transform: uppercase; letter-spacing: 2px;
        }

        .hud-top-left { position: absolute; top: 20px; left: 20px; border-left: 1px solid var(--current-accent); padding-left: 10px; }
        .hud-bottom-left { position: absolute; bottom: 20px; left: 20px; border-left: 1px solid var(--current-accent); padding-left: 10px; }
        .hud-center-decor {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 600px; height: 600px; border: 1px dashed rgba(255,255,255,0.05); border-radius: 50%;
            pointer-events: none; opacity: 0.5;
        }

        /* Top Right Control Box */
        #top-right-controls {
            position: absolute; top: 20px; right: 20px; z-index: 100;
            display: flex; gap: 10px;
            background: var(--bg-glass); backdrop-filter: blur(10px);
            border: 1px solid var(--current-accent); border-radius: 4px; padding: 5px 10px;
            box-shadow: 0 0 10px var(--border-glow);
        }

        .control-btn {
            background: transparent; border: none; color: var(--current-accent);
            font-family: var(--font-mono); font-size: 12px; cursor: pointer;
            transition: all 0.2s; text-transform: uppercase;
        }
        .control-btn:hover { text-shadow: 0 0 8px var(--current-accent); color: var(--text-main); }
        .control-separator { color: var(--text-dim); }

        a.control-btn { text-decoration: none; display: flex; align-items: center; }

        /* Window System */
        #desktop-area { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 10; pointer-events: none; }

        .sci-fi-window {
            position: absolute; pointer-events: auto;
            background: var(--bg-panel); backdrop-filter: blur(15px);
            border: 1px solid var(--current-accent);
            box-shadow: 0 0 20px rgba(0,0,0,0.8), inset 0 0 15px rgba(255,255,255,0.05);
            display: flex; flex-direction: column;
            clip-path: polygon(0 0, calc(100% - 15px) 0, 100% 15px, 100% 100%, 15px 100%, 0 calc(100% - 15px));
            transition: opacity 0.2s, transform 0.2s;
            opacity: 0; transform: scale(0.95) translateY(10px);
        }

        .sci-fi-window.active-anim { opacity: 1; transform: scale(1) translateY(0); }

        .window-header {
            height: 30px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 10px; border-bottom: 1px solid rgba(255,255,255,0.1);
            background: linear-gradient(90deg, rgba(255,255,255,0.05), transparent);
            cursor: move;
        }

        .window-title { font-family: var(--font-mono); font-size: 11px; color: var(--current-accent); letter-spacing: 1px; text-transform: uppercase; }

        .win-controls { display: flex; gap: 8px; }
        .win-btn {
            background: transparent; border: none; color: var(--text-dim);
            font-size: 10px; cursor: pointer; transition: color 0.2s;
            font-family: var(--font-mono);
        }
        .win-btn:hover { color: var(--current-accent); }
        .win-btn.close-btn:hover { color: #ff4444; }

        .window-content { flex: 1; position: relative; }
        .window-content iframe { width: 100%; height: 100%; border: none; background: transparent; }

        .iframe-shield {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 5; display: none; background: transparent;
        }
        .sci-fi-window:not(.focused) .iframe-shield { display: block; }

        .resize-handle {
            position: absolute; right: 0; bottom: 0; width: 20px; height: 20px;
            cursor: se-resize;
        }
        .resize-handle::after {
            content: ''; position: absolute; right: 3px; bottom: 3px; width: 10px; height: 10px;
            border-right: 2px solid var(--current-accent); border-bottom: 2px solid var(--current-accent);
        }

        /* App Drawer Trigger (Bottom Right) */
        #app-drawer-btn {
            position: absolute; bottom: 30px; right: 30px; z-index: 100;
            width: 60px; height: 60px; border-radius: 50%;
            background: rgba(0,0,0,0.5);
            border: 2px solid var(--current-accent);
            box-shadow: 0 0 15px var(--border-glow), inset 0 0 10px var(--border-glow);
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            transition: all 0.3s;
        }
        #app-drawer-btn::after {
            content: ''; width: 30px; height: 30px; border-radius: 50%;
            background: rgba(255,255,255,0.1); box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);
        }
        #app-drawer-btn:hover { transform: scale(1.1); box-shadow: 0 0 25px var(--border-glow), inset 0 0 20px var(--border-glow); }

        /* Modal App Tray */
        #app-tray-modal {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 200;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(20px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        #app-tray-modal.show { opacity: 1; pointer-events: auto; }

        .tray-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 30px; width: 80%; max-width: 1000px;
        }

        .tray-item {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; padding: 20px; display: flex; flex-direction: column; align-items: center;
            cursor: pointer; transition: all 0.2s; position: relative;
        }
        .tray-item:hover {
            border-color: var(--current-accent); background: rgba(255,255,255,0.05);
            box-shadow: 0 0 20px var(--border-glow); transform: translateY(-5px);
        }
        .tray-glyph { font-size: 32px; color: var(--current-accent); margin-bottom: 10px; font-family: var(--font-mono); }
        .tray-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-main); font-family: var(--font-mono); text-align: center; }

        .tray-item.active::after {
            content: ''; position: absolute; bottom: -5px; width: 30px; height: 3px;
            background: var(--current-accent); box-shadow: 0 0 10px var(--current-accent);
        }

        /* Active Module Rail (Bottom Left) */
        #active-rail {
            position: absolute; bottom: 30px; left: 30px; z-index: 50;
            display: flex; gap: 10px;
        }

        .rail-item {
            width: 40px; height: 40px; border: 1px solid rgba(255,255,255,0.2);
            background: var(--bg-glass); backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: all 0.2s;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }
        .rail-item:hover { border-color: var(--current-accent); box-shadow: 0 0 10px var(--border-glow); }
        .rail-item .rail-glyph { font-size: 16px; color: var(--text-main); }
        .rail-item.focused { border-color: var(--current-accent); }
        .rail-item.focused .rail-glyph { color: var(--current-accent); text-shadow: 0 0 5px var(--current-accent); }

        /* Settings Modal */
        #settings-modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            width: 400px; background: var(--bg-panel); backdrop-filter: blur(20px);
            border: 1px solid var(--current-accent); padding: 20px; z-index: 300;
            opacity: 0; pointer-events: none; transition: all 0.2s;
            clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
        }
        #settings-modal.show { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }

        .settings-header { font-family: var(--font-mono); color: var(--current-accent); font-size: 14px; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; text-transform: uppercase; }
        .settings-row { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
        .settings-row label { font-size: 10px; text-transform: uppercase; color: var(--text-dim); }
        .settings-row input, .settings-row select {
            background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2);
            color: var(--text-main); padding: 8px; font-family: var(--font-mono); font-size: 12px;
        }
        .settings-row input:focus, .settings-row select:focus { border-color: var(--current-accent); outline: none; }

        .color-grid { display: flex; gap: 10px; }
        .color-swatch { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .color-swatch.active { border-color: #fff; transform: scale(1.1); }

        .close-settings-btn {
            background: transparent; border: 1px solid var(--current-accent); color: var(--current-accent);
            padding: 8px 15px; font-family: var(--font-mono); cursor: pointer; text-transform: uppercase; width: 100%; margin-top: 10px;
        }
        .close-settings-btn:hover { background: rgba(0, 255, 255, 0.1); }

    </style>
</head>
<body>

    <!-- HUD Background -->
    <div id="hud-background">
        <div class="hud-top-left">
            SYS.CORE.ONLINE<br>
            <span id="hud-time">00:00:00</span> | <span id="hud-date">YYYY.MM.DD</span><br>
            CPU: <span id="hud-cpu">--%</span>
        </div>
        <div class="hud-bottom-left">
            LYRN // v6.2049
        </div>
        <div class="hud-center-decor"></div>
    </div>

    <!-- Top Right Controls -->
    <div id="top-right-controls">
        <button class="control-btn" onclick="cascadeWindows()">Cascade</button>
        <span class="control-separator">/</span>
        <button class="control-btn" onclick="toggleFullScreen()">Full</button>
        <span class="control-separator">/</span>
        <a href="dashboard.html" class="control-btn">Classic Dashboard</a>
    </div>

    <!-- Desktop Area for Windows -->
    <div id="desktop-area"></div>

    <!-- Active Module Rail -->
    <div id="active-rail"></div>

    <!-- App Drawer Button -->
    <div id="app-drawer-btn" onclick="toggleAppTray()"></div>

    <!-- Modal App Tray -->
    <div id="app-tray-modal">
        <div style="width: 100%; text-align: right; padding: 20px;">
            <button class="control-btn" style="font-size: 24px;" onclick="toggleAppTray()">✕</button>
        </div>
        <div class="tray-grid" id="tray-grid-container">
            <!-- Populated via JS -->
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal">
        <div class="settings-header">System Settings</div>
        <div class="settings-row">
            <label>Core URL</label>
            <input type="text" id="setting-core-url" />
        </div>
        <div class="settings-row">
            <label>Font Size</label>
            <input type="number" id="setting-font-size" />
        </div>
        <div class="settings-row">
            <label>Accent Color</label>
            <div class="color-grid" id="color-grid-container">
                <!-- Swatches populated via JS -->
            </div>
        </div>
        <button class="close-settings-btn" onclick="closeSettings()">Apply & Close</button>
    </div>

    <script>
        // Data & State
        const GLYPH_MAP = {
            "mod_chat": "COMM",
            "mod_claude_code": "AI",
            "mod_builder": "△",
            "mod_file_tree": "▤",
            "mod_models": "◇",
            "mod_model_manager": "▣",
            "mod_logs": "≋",
            "mod_server_status": "◉",
            "mod_job_mgr": "⟐",
            "mod_delta_mgr": "Δ"
        };

        // Settings glyph for the tray
        const SYS_SETTINGS_GLYPH = "SYS";

        const MODULE_REGISTRY = [
            { id: "mod_chat", file: "Chat Interface.html", name: "Chat", icon: "💬" },
            { id: "mod_claude_code", file: "ClaudeCode.html", name: "Claude Code", icon: "🤖" },
            { id: "mod_builder", file: "Snapshot Builder.html", name: "Snapshot Builder", icon: "🛠️" },
            { id: "mod_file_tree", file: "FileTreeViewer.html", name: "File Tree Viewer", icon: "📁" },
            { id: "mod_models", file: "ModelController.html", name: "Model Controller", icon: "🧠" },
            { id: "mod_model_manager", file: "ModelManager.html", name: "Model Manager", icon: "📦" },
            { id: "mod_logs", file: "LogViewer.html", name: "System Logs", icon: "📜" },
            { id: "mod_server_status", file: "ServerStatus.html", name: "System Status", icon: "📊" },
            { id: "mod_job_mgr", file: "JobManager.html", name: "Job Manager", icon: "🦺" },
            { id: "mod_delta_mgr", file: "DeltaManager.html", name: "Delta Manager", icon: "Δ" },
        ];

        const ACCENT_COLORS = [
            { name: "Cyan", value: "#00ffff" },
            { name: "White", value: "#ffffff" },
            { name: "Dark Grey", value: "#4a4a4a" },
            { name: "Purple", value: "#7c5cff" },
            { name: "Lime", value: "#a3ff00" },
            { name: "Orange", value: "#ff7700" },
            { name: "Lemon", value: "#ffee00" }
        ];

        let appSettings = {
            coreUrl: "http://localhost:8000",
            fontSize: 12,
            accentColor: "#00ffff"
        };

        let authToken = null;
        let zIndexCounter = 100;
        let openWindows = {}; // { id: windowElement }
        let focusedWindowId = null;

        // Initialization
        document.addEventListener('DOMContentLoaded', () => {
            loadSettings();
            applyAccentColor(appSettings.accentColor);
            buildAppTray();
            startHudClock();

            // Handle shield clicks to focus
            document.getElementById('desktop-area').addEventListener('mousedown', (e) => {
                if(e.target.classList.contains('iframe-shield')) {
                    const win = e.target.closest('.sci-fi-window');
                    if(win) focusWindow(win.id.replace('win_', ''));
                }
            });
        });

        // Settings Management
        function loadSettings() {
            const saved = localStorage.getItem('lyrn_settings_2049');
            if(saved) {
                try { appSettings = { ...appSettings, ...JSON.parse(saved) }; } catch(e){}
            } else {
                // Try fallback to classic settings
                const classic = localStorage.getItem('lyrn_settings');
                if(classic) {
                    try {
                        const parsed = JSON.parse(classic);
                        if(parsed.fontSize) appSettings.fontSize = parsed.fontSize;
                    } catch(e){}
                }
            }

            // Attempt to get coreUrl if not http
            if(window.location.protocol.startsWith('http')) {
                appSettings.coreUrl = window.location.origin;
            }
            authToken = localStorage.getItem('lyrn_auth_token') || null;

            document.getElementById('setting-core-url').value = appSettings.coreUrl;
            document.getElementById('setting-font-size').value = appSettings.fontSize;
        }

        function saveSettings() {
            localStorage.setItem('lyrn_settings_2049', JSON.stringify(appSettings));
        }

        function applyAccentColor(hex) {
            document.documentElement.style.setProperty('--current-accent', hex);
            // Calculate a glow color by converting hex to rgb and adding alpha
            let r=0, g=0, b=0;
            if(hex.length == 7) {
                r = parseInt(hex.substring(1,3), 16);
                g = parseInt(hex.substring(3,5), 16);
                b = parseInt(hex.substring(5,7), 16);
            }
            document.documentElement.style.setProperty('--border-glow', `rgba(${r}, ${g}, ${b}, 0.4)`);
            appSettings.accentColor = hex;
            saveSettings();

            // Update color picker UI
            document.querySelectorAll('.color-swatch').forEach(sw => {
                sw.classList.toggle('active', sw.dataset.color === hex);
            });
        }

        // App Tray
        function buildAppTray() {
            const container = document.getElementById('tray-grid-container');
            container.innerHTML = '';

            MODULE_REGISTRY.forEach(mod => {
                const glyph = GLYPH_MAP[mod.id] || mod.icon;
                const div = document.createElement('div');
                div.className = 'tray-item';
                div.id = 'tray_item_' + mod.id;
                div.innerHTML = `<div class="tray-glyph">${glyph}</div><div class="tray-label">${mod.name}</div>`;
                div.onclick = () => { toggleAppTray(); launchOrFocusModule(mod); };
                container.appendChild(div);
            });

            // Add Settings
            const setDiv = document.createElement('div');
            setDiv.className = 'tray-item';
            setDiv.innerHTML = `<div class="tray-glyph">${SYS_SETTINGS_GLYPH}</div><div class="tray-label">SETTINGS</div>`;
            setDiv.onclick = () => { toggleAppTray(); openSettings(); };
            container.appendChild(setDiv);

            // Build Color Swatches
            const colorGrid = document.getElementById('color-grid-container');
            colorGrid.innerHTML = '';
            ACCENT_COLORS.forEach(c => {
                const swatch = document.createElement('div');
                swatch.className = 'color-swatch';
                swatch.style.backgroundColor = c.value;
                swatch.dataset.color = c.value;
                swatch.onclick = () => applyAccentColor(c.value);
                colorGrid.appendChild(swatch);
            });
        }

        function toggleAppTray() {
            const tray = document.getElementById('app-tray-modal');
            tray.classList.toggle('show');
            updateTrayActiveStates();
        }

        function updateTrayActiveStates() {
            MODULE_REGISTRY.forEach(mod => {
                const el = document.getElementById('tray_item_' + mod.id);
                if(el) el.classList.toggle('active', !!openWindows[mod.id]);
            });
            updateActiveRail();
        }

        // Active Rail
        function updateActiveRail() {
            const rail = document.getElementById('active-rail');
            rail.innerHTML = '';
            Object.keys(openWindows).forEach(modId => {
                const win = openWindows[modId];
                if(win) {
                    const glyph = GLYPH_MAP[modId] || "O";
                    const item = document.createElement('div');
                    item.className = 'rail-item ' + (focusedWindowId === modId ? 'focused' : '');
                    item.innerHTML = `<div class="rail-glyph">${glyph}</div>`;
                    item.onclick = () => restoreOrFocusModule(modId);
                    rail.appendChild(item);
                }
            });
        }

        // Window Management
        function launchOrFocusModule(mod) {
            if(openWindows[mod.id]) {
                restoreOrFocusModule(mod.id);
            } else {
                createWindow(mod);
            }
        }

        function restoreOrFocusModule(modId) {
            const win = openWindows[modId];
            if(win) {
                win.style.display = 'flex'; // Un-minimize if hidden
                focusWindow(modId);
            }
        }

        function createWindow(mod) {
            const id = 'win_' + mod.id;
            const area = document.getElementById('desktop-area');

            const win = document.createElement('div');
            win.className = 'sci-fi-window';
            win.id = id;
            win.style.zIndex = ++zIndexCounter;

            // Initial positioning
            const offset = (Object.keys(openWindows).length * 40) + 50;
            win.style.width = window.innerWidth <= 600 ? '95%' : '800px';
            win.style.height = window.innerWidth <= 600 ? '70vh' : '600px';
            win.style.left = window.innerWidth <= 600 ? '2.5%' : `${offset}px`;
            win.style.top = window.innerWidth <= 600 ? '10%' : `${offset}px`;

            win.innerHTML = `
                <div class="window-header" onmousedown="startDrag(event, '${id}')">
                    <span class="window-title">${mod.name}</span>
                    <div class="win-controls">
                         <button class="win-btn" onclick="minimizeWindow('${mod.id}', event)">_</button>
                         <button class="win-btn close-btn" onclick="closeWindow('${mod.id}', event)">✕</button>
                    </div>
                </div>
                <div class="window-content">
                    <div class="iframe-shield"></div>
                    <iframe src="modules/${mod.file}"></iframe>
                </div>
                <div class="resize-handle" onmousedown="startResize(event, '${id}')"></div>
            `;

            area.appendChild(win);
            openWindows[mod.id] = win;

            // Trigger entry animation
            requestAnimationFrame(() => win.classList.add('active-anim'));

            // Post settings to iframe
            const iframe = win.querySelector('iframe');
            iframe.onload = () => {
                iframe.contentWindow.postMessage({ type: 'THEME_CHANGE', theme: 'corporate-2049' }, '*');
                iframe.contentWindow.postMessage({ type: 'FONT_CHANGE', fontSize: appSettings.fontSize }, '*');
                iframe.contentWindow.postMessage({ type: 'CORE_URL_CHANGE', url: appSettings.coreUrl }, '*');
                if(authToken) iframe.contentWindow.postMessage({ type: 'TOKEN_UPDATE', token: authToken }, '*');
            };

            focusWindow(mod.id);
            updateTrayActiveStates();
        }

        function focusWindow(modId) {
            focusedWindowId = modId;
            Object.keys(openWindows).forEach(k => {
                const w = openWindows[k];
                if(w) {
                    if(k === modId) {
                        w.style.zIndex = ++zIndexCounter;
                        w.classList.add('focused');
                    } else {
                        w.classList.remove('focused');
                    }
                }
            });
            updateActiveRail();
        }

        function closeWindow(modId, e) {
            if(e) e.stopPropagation();
            const win = openWindows[modId];
            if(win) {
                win.classList.remove('active-anim');
                setTimeout(() => {
                    win.remove();
                    delete openWindows[modId];
                    if(focusedWindowId === modId) focusedWindowId = null;
                    updateTrayActiveStates();
                }, 200);
            }
        }

        function minimizeWindow(modId, e) {
            if(e) e.stopPropagation();
            const win = openWindows[modId];
            if(win) {
                win.style.display = 'none';
                if(focusedWindowId === modId) focusedWindowId = null;
                updateActiveRail();
            }
        }

        function cascadeWindows() {
            let offset = 50;
            Object.values(openWindows).forEach(win => {
                if(win.style.display !== 'none') {
                    win.style.left = offset + 'px';
                    win.style.top = offset + 'px';
                    win.style.width = '800px';
                    win.style.height = '600px';
                    offset += 40;
                }
            });
        }

        // Drag & Drop
        let activeDragId = null;
        let dragOffsets = { x: 0, y: 0 };
        let isResizing = false;

        function startDrag(e, winId) {
            if(e.target.closest('.win-controls')) return; // Ignore buttons
            activeDragId = winId;
            isResizing = false;
            const win = document.getElementById(winId);
            focusWindow(winId.replace('win_', ''));

            const rect = win.getBoundingClientRect();
            dragOffsets.x = e.clientX - rect.left;
            dragOffsets.y = e.clientY - rect.top;

            document.addEventListener('mousemove', doDrag);
            document.addEventListener('mouseup', stopDrag);
        }

        function doDrag(e) {
            if(!activeDragId || isResizing) return;
            const win = document.getElementById(activeDragId);
            if(win) {
                win.style.left = (e.clientX - dragOffsets.x) + 'px';
                win.style.top = (e.clientY - dragOffsets.y) + 'px';
            }
        }

        function stopDrag() {
            activeDragId = null;
            document.removeEventListener('mousemove', doDrag);
            document.removeEventListener('mouseup', stopDrag);
        }

        // Resizing
        let activeResizeId = null;
        let startRect = null;
        let startMouse = null;

        function startResize(e, winId) {
            e.stopPropagation();
            activeResizeId = winId;
            isResizing = true;
            const win = document.getElementById(winId);
            focusWindow(winId.replace('win_', ''));

            startRect = win.getBoundingClientRect();
            startMouse = { x: e.clientX, y: e.clientY };

            document.addEventListener('mousemove', doResize);
            document.addEventListener('mouseup', stopResize);
        }

        function doResize(e) {
            if(!activeResizeId) return;
            const win = document.getElementById(activeResizeId);
            if(win) {
                const newW = Math.max(300, startRect.width + (e.clientX - startMouse.x));
                const newH = Math.max(200, startRect.height + (e.clientY - startMouse.y));
                win.style.width = newW + 'px';
                win.style.height = newH + 'px';
            }
        }

        function stopResize() {
            activeResizeId = null;
            isResizing = false;
            document.removeEventListener('mousemove', doResize);
            document.removeEventListener('mouseup', stopResize);
        }

        // Settings Modal
        function openSettings() {
            document.getElementById('setting-core-url').value = appSettings.coreUrl;
            document.getElementById('setting-font-size').value = appSettings.fontSize;
            document.getElementById('settings-modal').classList.add('show');
        }

        function closeSettings() {
            appSettings.coreUrl = document.getElementById('setting-core-url').value;
            appSettings.fontSize = parseInt(document.getElementById('setting-font-size').value) || 12;
            saveSettings();

            // Broadcast to open iframes
            Object.values(openWindows).forEach(win => {
                const iframe = win.querySelector('iframe');
                if(iframe && iframe.contentWindow) {
                    iframe.contentWindow.postMessage({ type: 'CORE_URL_CHANGE', url: appSettings.coreUrl }, '*');
                    iframe.contentWindow.postMessage({ type: 'FONT_CHANGE', fontSize: appSettings.fontSize }, '*');
                }
            });

            document.getElementById('settings-modal').classList.remove('show');
        }

        // Utilities
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        function startHudClock() {
            setInterval(() => {
                const now = new Date();
                const d = now.toISOString().split('T')[0].replace(/-/g, '.');
                const t = now.toTimeString().split(' ')[0];
                document.getElementById('hud-date').innerText = d;
                document.getElementById('hud-time').innerText = t;
                // Fake CPU fluctuation
                const cpu = Math.floor(Math.random() * 15) + 5;
                document.getElementById('hud-cpu').innerText = cpu + '%';
            }, 1000);
        }

    </script>
</body>
</html>
