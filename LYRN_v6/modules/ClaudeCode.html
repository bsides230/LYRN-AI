<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Code Control Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <!-- xterm.js dependencies -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>

  <style>
    /* =========================================
       CORE VARIABLES (Matches other LYRN modules)
       ========================================= */
    :root {
      --bg-core: #050505;
      --bg-panel: #0a0a0a;
      --bg-input: #050505;
      --brand-purple: #7c5cff;
      --brand-purple-dim: rgba(124, 92, 255, 0.1);
      --text-head: #ffffff;
      --text-body: #b0b0b0;
      --text-dim: #666666;
      --border-color: #222222;
      --status-ok: #10B981;
      --status-warn: #F59E0B;
      --status-err: #EF4444;
      --font-size-base: 13px;
    }

    body[data-theme="light"] {
      --bg-core: #eef0f4;
      --bg-panel: #ffffff;
      --bg-input: #ffffff;
      --brand-purple: #6a4ce0;
      --brand-purple-dim: rgba(106, 76, 224, 0.1);
      --text-head: #111111;
      --text-body: #333333;
      --text-dim: #555555;
      --border-color: #d1d5db;
    }

    * { box-sizing: border-box; }

    /* --- THEMED SCROLLBARS --- */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; border: 2px solid transparent; background-clip: content-box; }
    ::-webkit-scrollbar-thumb:hover { background-color: var(--brand-purple); }

    body {
      margin: 0; padding: 0;
      background-color: var(--bg-core); color: var(--text-body);
      font-family: 'Inter', sans-serif;
      height: 100vh; width: 100vw; overflow: hidden;
      font-size: var(--font-size-base);
    }

    h2 {
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-head);
      font-size: 16px;
      margin: 0;
    }

    .app-wrapper { display: flex; flex-direction: column; height: 100vh; }

    /* --- HEADER (matches module convention) --- */
    header {
      border-bottom: 1px solid var(--border-color);
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-panel);
      flex-shrink: 0;
    }
    header .title-block { display: flex; flex-direction: column; gap: 2px; }
    .meta-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--brand-purple);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    .header-actions { display: flex; gap: 8px; align-items: center; }

    /* --- STATUS PILL --- */
    .status-pill {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.1em;
      padding: 4px 10px; border-radius: 12px;
      border: 1px solid var(--border-color); color: var(--text-dim);
      background: var(--bg-core);
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-dim); }
    .status-pill.connected { color: var(--status-ok); border-color: var(--status-ok); }
    .status-pill.connected .status-dot { background: var(--status-ok); box-shadow: 0 0 6px var(--status-ok); }
    .status-pill.connecting { color: var(--status-warn); border-color: var(--status-warn); }
    .status-pill.connecting .status-dot { background: var(--status-warn); }
    .status-pill.error { color: var(--status-err); border-color: var(--status-err); }
    .status-pill.error .status-dot { background: var(--status-err); }

    /* --- LAYOUT --- */
    .main-content { display: flex; flex: 1; overflow: hidden; }

    .control-panel {
      width: 320px;
      border-right: 1px solid var(--border-color);
      background: var(--bg-panel);
      display: flex; flex-direction: column;
      overflow-y: auto; padding: 16px; gap: 16px;
    }

    .terminal-container {
      flex: 1; background: #000; position: relative; min-width: 0;
    }
    #terminal-wrapper { width: 100%; height: 100%; padding: 8px; }

    /* --- SECTIONS --- */
    .section {
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background: var(--bg-core);
      overflow: hidden;
    }
    .section-header {
      background: var(--brand-purple-dim);
      padding: 8px 12px;
      border-bottom: 1px solid var(--border-color);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--brand-purple);
    }
    .section-body { padding: 12px; display: flex; flex-direction: column; gap: 12px; }

    /* --- INPUTS --- */
    .input-group { display: flex; flex-direction: column; gap: 4px; }
    .input-group label {
      font-size: 10px; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.5px;
      font-family: 'JetBrains Mono', monospace;
    }
    .input-group input[type="text"], .input-group select {
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      color: var(--text-head);
      padding: 6px 8px; border-radius: 4px;
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
      outline: none;
    }
    .input-group input[type="text"]:focus,
    .input-group select:focus { border-color: var(--brand-purple); }

    .toggle-row {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 11px; color: var(--text-body);
      font-family: 'JetBrains Mono', monospace;
    }

    /* Toggle Switch */
    .toggle-switch { position: relative; width: 32px; height: 18px; display: inline-block; flex-shrink: 0; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; cursor: pointer; inset: 0; background-color: var(--border-color); transition: .3s; border-radius: 18px; }
    .toggle-slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: var(--text-dim); transition: .3s; border-radius: 50%; }
    input:checked + .toggle-slider { background-color: var(--brand-purple); }
    input:checked + .toggle-slider:before { transform: translateX(14px); background-color: white; }

    /* --- BUTTONS --- */
    button {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      background: var(--bg-panel);
      border: 1px solid var(--border-color);
      color: var(--text-head);
      padding: 6px 10px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: all 0.15s ease;
      border-radius: 4px;
      width: 100%;
      text-align: center;
    }
    button:hover { border-color: var(--brand-purple); color: var(--brand-purple); background: var(--brand-purple-dim); }
    button.btn-primary {
      background: var(--brand-purple);
      color: #fff;
      border-color: var(--brand-purple);
      padding: 10px;
      font-size: 12px;
    }
    button.btn-primary:hover { background: #6a4ce0; color: #fff; border-color: #6a4ce0; }
    button.btn-ghost { background: transparent; }

    .header-actions button { width: auto; padding: 5px 10px; }

    .cmd-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .divider { border: 0; border-top: 1px solid var(--border-color); margin: 4px 0; }

    /* --- TOAST --- */
    #toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: var(--bg-panel); border: 1px solid var(--brand-purple);
      color: var(--text-head); padding: 10px 18px; border-radius: 4px;
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6); z-index: 11000;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

  <div class="app-wrapper">
    <header>
      <div class="title-block">
        <span class="meta-label">LYRN MODULE</span>
        <h2>Claude Code Control Center</h2>
      </div>
      <div class="header-actions">
        <span class="status-pill" id="status-pill">
          <span class="status-dot"></span>
          <span id="status-text">Idle</span>
        </span>
        <button onclick="clearTerminal()">Clear</button>
        <button onclick="connectTerminal()">Reconnect</button>
      </div>
    </header>

    <div class="main-content">
      <!-- Control Panel -->
      <div class="control-panel">

        <button class="btn-primary" onclick="launchClaudeCode()">▶ Launch Claude Code</button>

        <!-- Session / Workspace -->
        <div class="section">
          <div class="section-header">Workspace</div>
          <div class="section-body">
            <div class="input-group">
              <label>Working Directory (cwd)</label>
              <input type="text" id="flag-cwd" placeholder="/path/to/repo">
            </div>
            <div class="input-group">
              <label>Session Label</label>
              <input type="text" id="session-label" placeholder="optional name">
            </div>
            <div class="toggle-row" style="color: var(--text-dim); font-size: 10px;">
              <span>Terminal SID</span>
              <span id="sid-display" style="color: var(--brand-purple);">--</span>
            </div>
            <div class="toggle-row" style="color: var(--text-dim); font-size: 10px;">
              <span>Run ID</span>
              <span id="run-id-display" style="color: var(--brand-purple);">--</span>
            </div>
            <button class="btn-ghost" onclick="newRun()">New Run ID</button>
          </div>
        </div>

        <!-- Flags & Config -->
        <div class="section">
          <div class="section-header">Launch Flags</div>
          <div class="section-body">
            <div class="input-group">
              <label>Run Mode</label>
              <select id="flag-mode">
                <option value="interactive">Interactive</option>
                <option value="oneshot">One-shot Task</option>
                <option value="inspect">Read-only Inspect</option>
                <option value="patch">Patch-only</option>
              </select>
            </div>

            <div class="input-group">
              <label>Model (--model)</label>
              <select id="flag-model">
                <option value="">Default</option>
                <option value="claude-opus-4-6">Claude Opus 4.6</option>
                <option value="claude-sonnet-4-6">Claude Sonnet 4.6</option>
                <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5</option>
                <option value="claude-3-7-sonnet-20250219">Claude 3.7 Sonnet</option>
                <option value="claude-3-5-sonnet-20241022">Claude 3.5 Sonnet</option>
                <option value="claude-3-opus-20240229">Claude 3 Opus</option>
              </select>
            </div>

            <div class="input-group">
              <label>Effort Level (--effort)</label>
              <select id="flag-effort">
                <option value="">Default</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
                <option value="max">Max</option>
              </select>
            </div>

            <div class="input-group">
              <label>System Prompt (--system-prompt)</label>
              <input type="text" id="flag-prompt" placeholder="Optional override...">
            </div>

            <div class="toggle-row">
              <span>Auto Mode</span>
              <label class="toggle-switch">
                <input type="checkbox" id="flag-auto">
                <span class="toggle-slider"></span>
              </label>
            </div>

            <div class="toggle-row">
              <span>Skip Permissions</span>
              <label class="toggle-switch">
                <input type="checkbox" id="flag-perms">
                <span class="toggle-slider"></span>
              </label>
            </div>
          </div>
        </div>

        <!-- Command Preview -->
        <div class="section">
          <div class="section-header">Command Preview</div>
          <div class="section-body">
            <textarea id="cmd-preview" readonly rows="3"
              style="background: var(--bg-input); border: 1px solid var(--border-color);
                     color: var(--brand-purple); font-family: 'JetBrains Mono', monospace;
                     font-size: 11px; padding: 8px; border-radius: 4px; resize: vertical;
                     width: 100%; outline: none;"></textarea>
            <button class="btn-ghost" onclick="copyPreview()">Copy</button>
          </div>
        </div>

        <!-- Interactive Commands -->
        <div class="section">
          <div class="section-header">Interactive Commands</div>
          <div class="section-body">
            <div class="cmd-grid">
              <button onclick="injectCmd('/compact')">/compact</button>
              <button onclick="injectCmd('/clear')">/clear</button>
              <button onclick="injectCmd('/cost')">/cost</button>
              <button onclick="injectCmd('/status')">/status</button>
              <button onclick="injectCmd('/doctor')">/doctor</button>
              <button onclick="injectCmd('/insights')">/insights</button>
            </div>
          </div>
        </div>

        <!-- Auth & Settings -->
        <div class="section">
          <div class="section-header">Auth & Session</div>
          <div class="section-body">
            <div class="cmd-grid">
              <button onclick="injectCmd('claude auth login')">Auth Login</button>
              <button onclick="injectCmd('claude auth status')">Auth Status</button>
            </div>
            <hr class="divider">
            <button class="btn-ghost" onclick="injectCmd('claude remote-control')">Start Remote Control</button>
          </div>
        </div>

      </div>

      <!-- Terminal View -->
      <div class="terminal-container">
        <div id="terminal-wrapper"></div>
      </div>
    </div>
  </div>

  <div id="toast">Message</div>

  <script>
    // ---- Connection State ----
    let authToken = localStorage.getItem('lyrn_admin_token') || null;
    let coreUrl = localStorage.getItem('lyrn_core_url') || '';

    // Terminal state
    let term = null;
    let fitAddon = null;
    let socket = null;
    // Separate IDs: terminal SID stays stable across reconnects of the same
    // terminal pty. Run ID rotates on each Claude launch for clean boundaries.
    const sid = 'term_' + Math.random().toString(36).substr(2, 9);
    let runId = newRunIdValue();
    let lastSysMsg = null; // dedupe noisy system messages

    function newRunIdValue() {
      return 'run_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 4);
    }

    document.addEventListener('DOMContentLoaded', () => {
      initTerminal();
      document.getElementById('sid-display').innerText = sid;
      document.getElementById('run-id-display').innerText = runId;

      // Live-update preview as flags change
      ['flag-mode','flag-model','flag-effort','flag-prompt','flag-auto','flag-perms','flag-cwd']
        .forEach(id => {
          const el = document.getElementById(id);
          if (el) el.addEventListener('input', updatePreview);
          if (el) el.addEventListener('change', updatePreview);
        });
      updatePreview();

      // Try connecting immediately if we have config from localStorage
      if (coreUrl) connectTerminal();
      else setStatus('idle', 'Waiting for config');

      window.addEventListener('message', (event) => {
        const d = event.data || {};
        if (d.type === 'THEME_CHANGE') {
          document.body.setAttribute('data-theme', d.theme);
        }
        if (d.type === 'FONT_CHANGE') {
          document.documentElement.style.setProperty('--font-size-base', d.fontSize + 'px');
          if (term) {
            try { term.options.fontSize = parseInt(d.fontSize, 10) || 13; fitAddon && fitAddon.fit(); } catch(e){}
          }
        }
        if (d.type === 'TOKEN_UPDATE') {
          authToken = d.token;
          connectTerminal();
        }
        if (d.type === 'CORE_URL_CHANGE') {
          coreUrl = d.url;
          connectTerminal();
        }
      });

      window.addEventListener('resize', () => {
        if (fitAddon) { try { fitAddon.fit(); } catch(e){} }
      });
    });

    // ---- UI Helpers ----
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.innerText = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function sysMsg(color, text) {
      // Quiet duplicate system noise (e.g. repeated Disconnected lines)
      if (lastSysMsg === text) return;
      lastSysMsg = text;
      term.writeln(`\r\n\x1b[2m[sys]\x1b[0m \x1b[${color}m${text}\x1b[0m`);
    }

    function newRun() {
      runId = newRunIdValue();
      document.getElementById('run-id-display').innerText = runId;
      showToast('New run id: ' + runId);
      updatePreview();
    }

    function shellQuote(s) {
      // POSIX-safe single-quote wrapping; handles backticks, $, newlines, etc.
      return "'" + String(s).replace(/'/g, "'\\''") + "'";
    }

    function setStatus(state, label) {
      const pill = document.getElementById('status-pill');
      pill.classList.remove('connected', 'connecting', 'error');
      if (state === 'connected') pill.classList.add('connected');
      else if (state === 'connecting') pill.classList.add('connecting');
      else if (state === 'error') pill.classList.add('error');
      document.getElementById('status-text').innerText = label;
    }

    // ---- Terminal Logic ----
    function initTerminal() {
      const container = document.getElementById('terminal-wrapper');
      term = new Terminal({
        cursorBlink: true,
        theme: {
          background: '#000000',
          foreground: '#ffffff',
          cursor: '#7c5cff'
        },
        fontFamily: '"JetBrains Mono", monospace',
        fontSize: 13,
        allowProposedApi: true
      });

      fitAddon = new FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      term.open(container);

      term.onData(data => {
        if (socket && socket.readyState === WebSocket.OPEN) {
          socket.send(JSON.stringify({ type: 'input', data: data }));
        }
      });

      term.onResize(size => {
        if (socket && socket.readyState === WebSocket.OPEN) {
          socket.send(JSON.stringify({ type: 'resize', cols: size.cols, rows: size.rows }));
        }
      });

      setTimeout(() => { try { fitAddon.fit(); } catch(e){} }, 100);
    }

    function clearTerminal() {
      if (term) term.clear();
    }

    function connectTerminal() {
      if (socket) {
        try { socket.close(); } catch(e){}
        socket = null;
      }

      if (!coreUrl) {
        sysMsg('31', 'Core URL not set. Waiting for configuration...');
        setStatus('error', 'No Core URL');
        return;
      }

      let wsUrl = coreUrl.replace(/^http/, 'ws') + `/api/terminal/${sid}`;
      const params = new URLSearchParams();
      if (authToken) params.set('token', authToken);
      const cwd = (document.getElementById('flag-cwd').value || '').trim();
      if (cwd) params.set('cwd', cwd);
      const qs = params.toString();
      if (qs) wsUrl += '?' + qs;

      sysMsg('36', 'Connecting to terminal...');
      setStatus('connecting', 'Connecting');

      try {
        socket = new WebSocket(wsUrl);
      } catch (e) {
        sysMsg('31', 'Failed to open WebSocket.');
        setStatus('error', 'Error');
        return;
      }

      socket.onopen = () => {
        lastSysMsg = null;
        sysMsg('32', 'Connected.');
        setStatus('connected', 'Connected');
        setTimeout(() => { try { fitAddon.fit(); } catch(e){} }, 100);
      };

      socket.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'output') term.write(msg.data);
        } catch (e) {
          console.error('Failed to parse WS msg', e);
        }
      };

      socket.onclose = () => {
        sysMsg('31', 'Disconnected.');
        setStatus('error', 'Disconnected');
      };

      socket.onerror = () => {
        sysMsg('31', 'WebSocket Error.');
        setStatus('error', 'Error');
      };
    }

    function copyPreview() {
      const ta = document.getElementById('cmd-preview');
      ta.select();
      try { document.execCommand('copy'); showToast('Copied'); } catch(e){ showToast('Copy failed'); }
    }

    function buildLaunchCommand() {
      const parts = ['claude'];

      const mode = document.getElementById('flag-mode').value;
      // Mode → flag mapping (frontend convention; backend wraps as appropriate)
      if (mode === 'oneshot') parts.push('--print');
      else if (mode === 'inspect') parts.push('--read-only');
      else if (mode === 'patch') parts.push('--patch-only');

      const model = document.getElementById('flag-model').value;
      if (model) parts.push('--model', model);

      const effort = document.getElementById('flag-effort').value;
      if (effort) parts.push('--effort', effort);

      const prompt = document.getElementById('flag-prompt').value;
      if (prompt) parts.push('--system-prompt', shellQuote(prompt));

      if (document.getElementById('flag-auto').checked) parts.push('--enable-auto-mode');
      if (document.getElementById('flag-perms').checked) parts.push('--dangerously-skip-permissions');

      return parts.join(' ');
    }

    function updatePreview() {
      const ta = document.getElementById('cmd-preview');
      if (ta) ta.value = buildLaunchCommand();
    }

    // ---- Claude Code Control Logic ----
    function injectCmd(cmdStr) {
      if (!socket || socket.readyState !== WebSocket.OPEN) {
        showToast('Terminal not connected');
        return;
      }
      socket.send(JSON.stringify({ type: 'input', data: cmdStr + '\r\n' }));
      term.focus();
    }

    function launchClaudeCode() {
      // Rotate run id on each launch for clean run boundaries
      newRun();
      injectCmd(buildLaunchCommand());
    }
  </script>
</body>
</html>
