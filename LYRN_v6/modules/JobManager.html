<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Manager</title>
        <link rel="stylesheet" href="../themes/corporate-terminal.css" />
    <style>
        :root {
            --bg-core: #050505;
            --bg-panel: #0a0a0a;
            --brand-purple: #7c5cff;
            --text-head: #ffffff;
            --text-body: #b0b0b0;
            --text-dim: #666666;
            --border-color: #222222;
            --bg-input: #050505;
            --error-color: #ff4444;
            --success: #00cc66;

            --bg-color: var(--bg-core);
            --surface: var(--bg-panel);
            --text-primary: var(--text-body);
            --accent: var(--brand-purple);
            --danger: var(--error-color);
            --font-main: 'Inter', system-ui, sans-serif;
        }

        body[data-theme="light"] {
            --bg-core: #eef0f4;
            --bg-panel: #ffffff;
            --brand-purple: #6a4ce0;
            --text-head: #111111;
            --text-body: #333333;
            --text-dim: #555555;
            --border-color: #d1d5db;
            --bg-input: #ffffff;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            gap: 20px;
            transition: background-color 0.5s ease;
        }

        h2, h3 {
            margin-top: 0;
            color: var(--accent);
        }

        .container {
            display: flex;
            gap: 20px;
            flex: 1;
            min-height: 0;
        }

        .panel {
            background-color: var(--surface);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 1;
            overflow-y: auto;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-weight: 600;
            font-size: 0.9em;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        input[type="text"], select, textarea {
            background-color: var(--bg-color);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
        }

        input[type="text"], select {
            flex: 1;
        }

        textarea {
            resize: vertical;
            min-height: 150px;
        }

        button {
            background-color: var(--border-color);
            color: var(--text-primary);
            border: 1px solid var(--accent);
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        button:hover {
            background-color: var(--accent);
            color: var(--bg-color);
        }

        .primary-btn {
            background-color: var(--accent);
            color: var(--bg-color);
        }
        .primary-btn:hover {
            background-color: #b4befe;
        }

        .job-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .job-card {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .job-card.disabled {
            opacity: 0.6;
        }

        .job-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .job-name {
            font-weight: bold;
            color: var(--accent);
        }

        .job-trigger {
            font-size: 0.8em;
            color: #a6adc8;
        }

        .job-actions {
            display: flex;
            gap: 5px;
        }

        .run-btn {
            background-color: var(--success);
            color: var(--bg-color);
            border: none;
        }
        .run-btn:hover {
            background-color: #94e2d5;
        }

    </style>
</head>
<body>

    <style>
        /* Modals and Overlays */
        .db-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            display: none;
            flex-direction: column;
            z-index: 500;
            overflow: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        .db-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .db-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .db-card {
            background: var(--surface);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .db-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .db-card-title {
            font-weight: bold;
            flex: 1;
            text-align: left;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .db-card-input {
            width: 100%;
            background: var(--bg-color);
            color: var(--text-primary);
            border: 1px solid var(--accent);
            padding: 5px;
            border-radius: 4px;
            display: none;
            flex: 1;
        }

        .db-card.editing .db-card-title { display: none; }
        .db-card.editing .db-card-input { display: block; }

        .db-action-btn {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            display: none;
            padding: 5px;
            margin-left: 10px;
        }

        .db-card.editing .db-action-btn { display: block; }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--surface);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            width: 400px;
            max-width: 90%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Toolbar styles added dynamically */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--surface);
            padding: 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .toolbar-left, .toolbar-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .affordance-list {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .affordance-row {
            display: flex;
            gap: 5px;
        }
        .affordance-row input {
            flex: 1;
        }
    </style>

    <div class="toolbar">
        <div class="toolbar-left">
            <button onclick="openDatabaseOverlay()" class="primary-btn" style="margin-right: 10px;">Database</button>
            <select id="categorySelect" onchange="loadJobs()">
                <option value="">-- Category --</option>
            </select>
            <button onclick="openNewCategoryPopup()">+ Cat</button>
            <select id="jobSelect" onchange="loadSelectedJob()">
                <option value="">-- Job --</option>
            </select>
            <button onclick="openNewJobPopup()">+ Job</button>
            <button onclick="deleteJob()" style="background-color: var(--danger); color: var(--bg-color); border: none;">Trash</button>
        </div>
        <div class="toolbar-right">
            <button onclick="openSettingsPopup()">Settings</button>
            <button onclick="testTrigger()">Test</button>
            <button onclick="refreshJob()">Refresh</button>
            <button class="primary-btn" onclick="saveJob()">Save</button>
        </div>
    </div>

    <div class="container">
        <!-- Edit Form -->
        <div class="panel">
            <h3>Job Editor</h3>

            <div class="form-group" style="display: none;">
                <label>Job Name</label>
                <input type="text" id="jobName" placeholder="e.g., extract_keywords" disabled>
            </div>

            <div class="form-group">
                <label>Trigger Name (Minimal input to fire model)</label>
                <input type="text" id="triggerName" placeholder="e.g., run, execute">
            </div>

            <div class="form-group" style="flex: 1;">
                <label>Instruction Layer</label>
                <textarea id="instructionLayer" placeholder="Enter full job instructions here..."></textarea>
            </div>

            <div class="input-row">
                <div class="form-group" style="flex: 1;">
                    <label>Max Retries</label>
                    <input type="number" id="maxRetries" value="1" min="0">
                </div>
                <div class="form-group" style="flex: 2;">
                    <label>Retry Error Message</label>
                    <input type="text" id="retryErrorMessage" placeholder="e.g., Validation failed.">
                </div>
            </div>

            <div class="input-row">
                <div class="form-group" style="flex: 1;">
                    <label>Affordances (Trigger Responses)</label>
                    <div id="affordanceList" class="job-list" style="max-height: 200px; overflow-y: auto; border: 1px solid var(--border-color); padding: 5px;"></div>
                    <button onclick="openAffordancePopup()" style="align-self: flex-start; margin-top: 5px;">+ Add Affordance</button>
                </div>

                <div class="form-group" style="flex: 1;">
                    <label>Scripts (File paths)</label>
                    <div id="scriptList" class="job-list" style="max-height: 200px; overflow-y: auto; border: 1px solid var(--border-color); padding: 5px;"></div>
                    <button onclick="addScriptRow()" style="align-self: flex-start; margin-top: 5px;">+ Add Script</button>
                </div>
            </div>

            <div class="form-group">
                <label>Notes (Optional)</label>
                <input type="text" id="notes" placeholder="Optional notes...">
            </div>

            <div class="form-group">
                <label style="display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="jobEnabled" checked> Enabled
                </label>
            </div>
        </div>
    </div>

    <!-- Database Overlay -->
    <div id="dbOverlay" class="db-overlay">
        <div class="db-header">
            <h2 id="dbTitle">Job Database</h2>
            <div>
                <button id="dbEditBtn" onclick="toggleDbEditMode()" style="margin-right: 10px;">Edit</button>
                <button onclick="closeDatabaseOverlay()">Close</button>
            </div>
        </div>
        <div id="dbBreadcrumbs" style="margin-bottom: 20px; color: var(--accent); cursor: pointer;">
            <span onclick="renderDbCategories()">Categories</span>
        </div>
        <div id="dbContent" class="db-grid">
            <!-- Populated dynamically -->
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal-overlay">
        <div class="modal-content">
            <h3>Job Settings</h3>
            <div class="form-group">
                <label>Global Job Trigger Text</label>
                <input type="text" id="settingTriggerText" placeholder="e.g. ##JOB_START##">
                <small style="color: var(--text-dim); margin-top: 5px;">This text is written to trigger.txt and read by scripts to trigger job execution.</small>
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px;">
                <button onclick="closeSettingsPopup()">Cancel</button>
                <button class="primary-btn" onclick="saveSettings()">Save</button>
            </div>
        </div>
    </div>

    <script>
        // Use local token logic
        function getToken() {
            return localStorage.getItem('lyrn_admin_token') || 'lyrn';
        }

        const API_BASE = window.location.origin.includes('localhost') || window.location.origin.includes('127.0.0.1')
            ? window.location.origin
            : ''; // Adjust if needed

        let currentJobs = [];
        let editingJobId = null;

        let dbMode = false; // Is DB overlay open?
        let dbEditMode = false; // Is DB in edit mode?
        let dbCurrentView = 'categories'; // 'categories' or 'jobs'
        let dbCurrentCategory = null;

        async function fetchAPI(endpoint, options = {}) {
            const url = `${API_BASE}${endpoint}`;
            const headers = {
                'X-Token': getToken(),
                'Content-Type': 'application/json',
                ...options.headers
            };

            const response = await fetch(url, { ...options, headers });
            if (!response.ok) {
                const text = await response.text();
                throw new Error(`API Error: ${response.status} - ${text}`);
            }
            return response.json();
        }

        async function loadCategories() {
            try {
                const data = await fetchAPI('/api/jobs/categories');
                const select = document.getElementById('categorySelect');
                const currentVal = select.value;

                select.innerHTML = '<option value="">-- Select Category --</option>';
                data.categories.forEach(cat => {
                    const opt = document.createElement('option');
                    opt.value = cat;
                    opt.textContent = cat;
                    select.appendChild(opt);
                });

                if (currentVal && data.categories.includes(currentVal)) {
                    select.value = currentVal;
                }
            } catch (e) {
                console.error("Failed to load categories:", e);
                alert("Failed to load categories: " + e.message);
            }
        }

        async function createCategory() {
            const name = prompt("Enter new category name:");
            if (!name) return;

            try {
                await fetchAPI('/api/jobs/categories', {
                    method: 'POST',
                    body: JSON.stringify({ category: name })
                });
                await loadCategories();
                document.getElementById('categorySelect').value = name;
                loadJobs();
            } catch (e) {
                console.error("Failed to create category:", e);
                alert("Failed to create category: " + e.message);
            }
        }

        async function loadJobs() {
            const category = document.getElementById('categorySelect').value;
            const jobSelect = document.getElementById('jobSelect');

            if (!category) {
                jobSelect.innerHTML = '<option value="">-- Job --</option>';
                currentJobs = [];
                clearForm();
                return;
            }

            try {
                const data = await fetchAPI(`/api/jobs/${category}`);
                currentJobs = data.jobs || [];

                const currentJobVal = jobSelect.value;
                jobSelect.innerHTML = '<option value="">-- Job --</option>';

                currentJobs.forEach(job => {
                    const opt = document.createElement('option');
                    opt.value = job.job_id;
                    opt.textContent = job.job_name;
                    jobSelect.appendChild(opt);
                });

                if (currentJobVal && currentJobs.find(j => j.job_id === currentJobVal)) {
                    jobSelect.value = currentJobVal;
                } else {
                    clearForm();
                }
            } catch (e) {
                console.error("Failed to load jobs:", e);
                jobSelect.innerHTML = '<option value="">Error</option>';
            }
        }

        async function refreshJob() {
            const category = document.getElementById('categorySelect').value;
            const jobId = document.getElementById('jobSelect').value;
            if (!category) {
                await loadCategories();
                return;
            }
            if (!jobId) {
                await loadJobs();
                return;
            }
            await loadJobs();
            document.getElementById('jobSelect').value = jobId;
            loadSelectedJob();
        }

        function loadSelectedJob() {
            const jobId = document.getElementById('jobSelect').value;
            if (!jobId) {
                clearForm();
                return;
            }

            const job = currentJobs.find(j => j.job_id === jobId);
            if (!job) return;

            editingJobId = job.job_id;
            document.getElementById('jobName').value = job.job_name;
            document.getElementById('triggerName').value = job.trigger_name;
            document.getElementById('instructionLayer').value = job.instruction_layer;
            document.getElementById('notes').value = job.notes || '';
            document.getElementById('jobEnabled').checked = job.enabled;
            document.getElementById('maxRetries').value = job.max_retries || 1;
            document.getElementById('retryErrorMessage').value = job.retry_error_message || '';

            let affordances = [];
            if (job.affordances) {
                affordances = job.affordances.split('|').filter(a => a.trim());
            }
            renderList('affordanceList', affordances);

            let scripts = [];
            if (job.scripts) {
                scripts = job.scripts.split('|').filter(s => s.trim());
            }
            renderList('scriptList', scripts);
        }

        function renderList(listId, items) {
            const list = document.getElementById(listId);
            list.innerHTML = '';
            items.forEach((item) => {
                addListRow(listId, item);
            });
        }

        function addListRow(listId, value = "") {
            const list = document.getElementById(listId);
            const row = document.createElement('div');
            row.className = 'affordance-row';

            const inputClass = listId === 'affordanceList' ? 'affordance-input' : 'script-input';
            const placeholder = listId === 'affordanceList' ? 'Category/JobName' : 'scripts/my_script.py';

            row.innerHTML = `
                <input type="text" class="${inputClass}" value="${value}" placeholder="${placeholder}" readonly onclick="highlightRow(this)">
                <button type="button" class="del-btn" onclick="deleteRow(this)" disabled style="color: grey;">-</button>
            `;
            list.appendChild(row);
        }

        function highlightRow(inputEl) {
            const list = inputEl.closest('.job-list');
            list.querySelectorAll('.affordance-row').forEach(row => {
                row.style.backgroundColor = '';
                const btn = row.querySelector('.del-btn');
                btn.disabled = true;
                btn.style.color = 'grey';
            });

            inputEl.closest('.affordance-row').style.backgroundColor = 'var(--border-color)';
            const delBtn = inputEl.parentElement.querySelector('.del-btn');
            delBtn.disabled = false;
            delBtn.style.color = 'var(--danger)';
        }

        function deleteRow(btnEl) {
            if (confirm("Remove this entry?")) {
                btnEl.parentElement.remove();
            }
        }

        async function openAffordancePopup() {
            let cat = prompt("Enter Target Category:");
            if (!cat) return;
            let job = prompt("Enter Target Job Name:");
            if (!job) return;
            addListRow('affordanceList', `${cat}/${job}`);
        }

        function addScriptRow() {
            let path = prompt("Enter host script path (e.g., scripts/myscript.py):");
            if (!path) return;
            addListRow('scriptList', path);
        }

        function getListValues(selector) {
            const inputs = document.querySelectorAll(selector);
            const values = [];
            inputs.forEach(input => {
                const val = input.value.trim();
                if (val) values.push(val);
            });
            return values.join('|');
        }

        function clearForm() {
            editingJobId = null;
            document.getElementById('jobName').value = '';
            document.getElementById('triggerName').value = '';
            document.getElementById('instructionLayer').value = '';
            document.getElementById('notes').value = '';
            document.getElementById('maxRetries').value = '1';
            document.getElementById('retryErrorMessage').value = '';
            document.getElementById('jobEnabled').checked = true;
            renderList('affordanceList', []);
            renderList('scriptList', []);
        }

        async function openNewCategoryPopup() {
            const cat = prompt("Enter new Category name:");
            if (!cat) return;
            try {
                await fetchAPI('/api/jobs/categories', {
                    method: 'POST',
                    body: JSON.stringify({ category: cat })
                });
                await loadCategories();
                document.getElementById('categorySelect').value = cat;
                await loadJobs();
            } catch (e) {
                alert("Category might already exist or failed: " + e.message);
            }
        }

        async function openNewJobPopup() {
            const cat = document.getElementById('categorySelect').value;
            if (!cat) {
                alert("Please select a Category first.");
                return;
            }
            const jobName = prompt("Enter new Job Name:");
            if (!jobName) return;

            try {
                const jobData = {
                    job_name: jobName,
                    trigger_name: 'run',
                    instruction_layer: 'Job instructions here...',
                    affordances: '',
                    scripts: '',
                    max_retries: 1,
                    retry_error_message: "",
                    enabled: true
                };

                const res = await fetchAPI(`/api/jobs/${cat}`, {
                    method: 'POST',
                    body: JSON.stringify(jobData)
                });

                await loadJobs();
                document.getElementById('jobSelect').value = res.job.job_id;
                loadSelectedJob();
            } catch (e) {
                alert("Failed to create job: " + e.message);
            }
        }

        async function deleteJob() {
            const category = document.getElementById('categorySelect').value;
            const jobId = document.getElementById('jobSelect').value;

            if (!category || !jobId) {
                alert("Please select a job to delete.");
                return;
            }

            if (!confirm("Are you sure you want to delete this job?")) return;

            try {
                await fetchAPI(`/api/jobs/${category}/${jobId}`, {
                    method: 'DELETE'
                });
                await loadJobs();
                clearForm();
            } catch(e) {
                alert("Failed to delete job: " + e.message);
            }
        }

        async function saveJob() {
            const category = document.getElementById('categorySelect').value;
            if (!category) {
                alert("Please select or create a category first.");
                return;
            }

            const jobName = document.getElementById('jobName').value.trim();
            const triggerName = document.getElementById('triggerName').value.trim();
            const instructionLayer = document.getElementById('instructionLayer').value.trim();
            const maxRetries = parseInt(document.getElementById('maxRetries').value) || 0;
            const retryErrorMessage = document.getElementById('retryErrorMessage').value.trim();
            const affordancesStr = getListValues('.affordance-input');
            const scriptsStr = getListValues('.script-input');

            if (!jobName || !triggerName || !instructionLayer) {
                alert("Job Name, Trigger Name, and Instruction Layer are required.");
                return;
            }

            const jobData = {
                job_id: editingJobId, // will be null if creating
                job_name: jobName,
                trigger_name: triggerName,
                instruction_layer: instructionLayer,
                affordances: affordancesStr,
                scripts: scriptsStr,
                max_retries: maxRetries,
                retry_error_message: retryErrorMessage,
                notes: document.getElementById('notes').value.trim(),
                enabled: document.getElementById('jobEnabled').checked
            };

            try {
                if (editingJobId) {
                    await fetchAPI(`/api/jobs/${category}/${editingJobId}`, {
                        method: 'PUT',
                        body: JSON.stringify(jobData)
                    });
                } else {
                    const res = await fetchAPI(`/api/jobs/${category}`, {
                        method: 'POST',
                        body: JSON.stringify(jobData)
                    });
                    editingJobId = res.job.job_id;
                }

                alert("Job saved successfully.");
                await loadJobs(); // refresh list
                document.getElementById('jobSelect').value = editingJobId;

                if (dbMode && dbEditMode) {
                    // Return to DB list if we were editing inside DB
                    openDatabaseOverlay();
                    if (dbCurrentCategory) {
                        renderDbJobs(dbCurrentCategory);
                    }
                }
            } catch (e) {
                console.error("Failed to save job:", e);
                alert("Failed to save job: " + e.message);
            }
        }

        async function runJob(jobName) {
            const category = document.getElementById('categorySelect').value;
            if(!category) return;

            if(!confirm(`Inject job '${jobName}' into model?`)) return;

            try {
                const res = await fetchAPI('/api/jobs/inject/run', {
                    method: 'POST',
                    body: JSON.stringify({ category, job_name: jobName })
                });
                alert("Injection triggered. " + (res.output || ""));
            } catch (e) {
                console.error("Failed to run job:", e);
                alert("Failed to inject job: " + e.message);
            }
        }

        // Theme and message handling
        window.addEventListener('message', (e) => {
            if (e.data.type === 'THEME_CHANGE') {
                document.body.setAttribute('data-theme', e.data.theme);
            } else if (e.data.type === 'FONT_CHANGE') {
                document.body.style.fontSize = e.data.fontSize + 'px';
            } else if (e.data.type === 'CORE_URL_CHANGE') {
                // Adjust API base if needed, not heavily relying on this yet in JM
            }
        });

        async function openSettingsPopup() {
            try {
                const triggerRes = await fetchAPI('/api/jobs/config/trigger');
                document.getElementById('settingTriggerText').value = triggerRes.trigger_text;
                document.getElementById('settingsModal').style.display = 'flex';
            } catch (e) {
                alert("Failed to load settings: " + e.message);
            }
        }

        function closeSettingsPopup() {
            document.getElementById('settingsModal').style.display = 'none';
        }

        async function saveSettings() {
            const triggerText = document.getElementById('settingTriggerText').value.trim();
            if (!triggerText) {
                alert("Trigger text cannot be empty.");
                return;
            }

            try {
                await fetchAPI('/api/jobs/config/trigger', {
                    method: 'POST',
                    body: JSON.stringify({ trigger_text: triggerText })
                });
                closeSettingsPopup();
            } catch (e) {
                alert("Failed to save settings: " + e.message);
            }
        }

        async function testTrigger() {
            try {
                // Fetch the trigger text
                const triggerRes = await fetchAPI('/api/jobs/config/trigger');
                const triggerText = triggerRes.trigger_text;

                // Send it to chat endpoint
                const res = await fetchAPI('/api/chat', {
                    method: 'POST',
                    body: JSON.stringify({ message: triggerText })
                });

                // Read the first stream event to confirm it started
                alert(`Test triggered successfully with text: ${triggerText}`);
            } catch (e) {
                console.error("Test trigger failed:", e);
                alert("Failed to send test trigger: " + e.message);
            }
        }

        /* --- Database Overlay Functions --- */

        async function openDatabaseOverlay() {
            dbMode = true;
            document.getElementById('dbOverlay').style.display = 'flex';
            if (dbCurrentView === 'categories') {
                await renderDbCategories();
            } else if (dbCurrentCategory) {
                await renderDbJobs(dbCurrentCategory);
            }
        }

        function closeDatabaseOverlay() {
            dbMode = false;
            dbEditMode = false;
            updateDbEditButton();
            document.getElementById('dbOverlay').style.display = 'none';
        }

        function toggleDbEditMode() {
            dbEditMode = !dbEditMode;
            updateDbEditButton();

            // Toggle classes on cards
            const cards = document.querySelectorAll('.db-card');
            cards.forEach(card => {
                if (dbEditMode) {
                    card.classList.add('editing');
                } else {
                    card.classList.remove('editing');
                }
            });
        }

        function updateDbEditButton() {
            const btn = document.getElementById('dbEditBtn');
            btn.textContent = dbEditMode ? 'Done' : 'Edit';
            btn.className = dbEditMode ? 'primary-btn' : '';
        }

        async function renderDbCategories() {
            dbCurrentView = 'categories';
            dbCurrentCategory = null;
            document.getElementById('dbBreadcrumbs').innerHTML = `<span>Categories</span>`;

            try {
                const data = await fetchAPI('/api/jobs/categories');
                const container = document.getElementById('dbContent');
                container.innerHTML = '';

                data.categories.forEach(cat => {
                    const card = document.createElement('div');
                    card.className = 'db-card';
                    if (dbEditMode) card.classList.add('editing');

                    card.innerHTML = `
                        <span class="db-card-title">${cat}</span>
                        <input type="text" class="db-card-input" value="${cat}" onclick="event.stopPropagation()">
                        <button class="db-action-btn" onclick="event.stopPropagation(); renameDbCategory('${cat}', this.previousElementSibling.value)">💾</button>
                        <button class="db-action-btn" onclick="event.stopPropagation(); deleteDbCategory('${cat}')">🗑</button>
                    `;

                    card.onclick = () => {
                        if (!dbEditMode) renderDbJobs(cat);
                    };

                    container.appendChild(card);
                });
            } catch (e) {
                alert("Failed to load categories for DB: " + e.message);
            }
        }

        async function renameDbCategory(oldName, newName) {
            if (!newName || newName === oldName) return;
            try {
                await fetchAPI(`/api/jobs/categories/${oldName}`, {
                    method: 'PUT',
                    body: JSON.stringify({ new_category: newName })
                });
                await loadCategories(); // Update main dropdowns
                await renderDbCategories();
            } catch (e) {
                alert("Failed to rename category: " + e.message);
            }
        }

        async function deleteDbCategory(cat) {
            if (!confirm("Are you sure you want to delete this category and all its jobs?")) return;
            try {
                await fetchAPI(`/api/jobs/categories/${cat}`, {
                    method: 'DELETE'
                });
                await loadCategories(); // Update main dropdowns
                await renderDbCategories();
            } catch (e) {
                alert("Failed to delete category: " + e.message);
            }
        }

        async function renderDbJobs(category) {
            dbCurrentView = 'jobs';
            dbCurrentCategory = category;
            document.getElementById('dbBreadcrumbs').innerHTML = `
                <span onclick="renderDbCategories()">Categories</span> > <span>${category}</span>
            `;

            try {
                const data = await fetchAPI(`/api/jobs/${category}`);
                const container = document.getElementById('dbContent');
                container.innerHTML = '';

                data.jobs.forEach(job => {
                    const card = document.createElement('div');
                    card.className = 'db-card';
                    if (dbEditMode) card.classList.add('editing');

                    card.innerHTML = `
                        <span class="db-card-title">${job.job_name}</span>
                        <button class="db-action-btn" onclick="event.stopPropagation(); editJobInDb('${job.job_id}')" style="color: var(--accent);">&#9998;</button>
                        <button class="db-action-btn" onclick="event.stopPropagation(); deleteDbJob('${job.job_id}')">🗑</button>
                    `;

                    card.onclick = () => {
                        if (!dbEditMode) {
                            // Load it in the main view and close overlay
                            document.getElementById('categorySelect').value = category;
                            loadJobs().then(() => {
                                document.getElementById('jobSelect').value = job.job_id;
                                loadSelectedJob();
                                closeDatabaseOverlay();
                            });
                        }
                    };

                    container.appendChild(card);
                });
            } catch (e) {
                alert("Failed to load jobs for DB: " + e.message);
            }
        }

        async function editJobInDb(jobId) {
            // Load job into main editor
            document.getElementById('categorySelect').value = dbCurrentCategory;
            await loadJobs();
            document.getElementById('jobSelect').value = jobId;
            loadSelectedJob();

            // Close overlay temporarily to edit
            document.getElementById('dbOverlay').style.display = 'none';
            // Note: DB mode is still 'true', so saving will reopen it.
        }

        async function deleteDbJob(jobId) {
            if (!confirm("Are you sure you want to delete this job?")) return;
            try {
                await fetchAPI(`/api/jobs/${dbCurrentCategory}/${jobId}`, {
                    method: 'DELETE'
                });
                await renderDbJobs(dbCurrentCategory);
                await loadJobs(); // Refresh main view
            } catch (e) {
                alert("Failed to delete job: " + e.message);
            }
        }

        // Init
        document.addEventListener('DOMContentLoaded', loadCategories);
    </script>
</body>
</html>
