<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LYRN RWI Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">

<div class="page-container">
    <header>
        <div>
            <div class="meta-label">LYRN SYSTEM MODULE</div>
            <h1 class="hero-title">RWI Prompt Builder</h1>
        </div>
        <div class="btn-group" style="align-items: center;">
            <div class="lock-control" style="display: flex; align-items: center; margin-right: 15px; gap: 10px;">
                 <span style="font-family: 'JetBrains Mono'; font-size: 11px; text-transform: uppercase; color: var(--text-dim);">Lock File</span>
                 <label class="switch">
                    <input type="checkbox" id="lock-toggle" onchange="toggleLock(this.checked)">
                    <span class="slider"></span>
                </label>
            </div>
            <button onclick="previewPrompt()">View Final Prompt</button>
            <button class="btn-primary" id="rebuild-btn" onclick="buildPrompt()">Rebuild Master Prompt</button>
        </div>
    </header>

    <div class="main-grid">
        <div class="panel">
            <div class="panel-header">
                <h3 class="panel-title">Components</h3>
                <button class="btn-icon" onclick="addNewComponent()">+</button>
            </div>
            <div id="components-list">
                </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                <h3 class="panel-title" id="editor-title">Editor</h3>
                <div class="btn-group">
                    <button class="btn-delete" id="delete-btn" style="display: none;" onclick="deleteCurrentComponent()">Delete</button>
                    <button class="btn-primary" id="save-btn" onclick="saveCurrentComponent()">Save</button>
                </div>
            </div>
            <div id="editor-container" class="editor-scroll">
                <p style="color: var(--text-dim); padding: 20px; text-align: center;">Select a component to edit.</p>
            </div>
        </div>
    </div>

    <footer>
        <span>LYRN SYSTEMS // THE SIMULATION COMPANY</span>
        <div class="footer-right">
            <span>RWI BUILDER // V1.1</span>
            <label class="theme-toggle-inline">
                THEME
                <span class="switch">
                    <input type="checkbox" id="theme-toggle" onchange="toggleTheme(this.checked)">
                    <span class="slider"></span>
                </span>
            </label>
        </div>
    </footer>
</div>

<div id="toast">Operation Successful</div>

<script src="script.js"></script>
</body>
</html>
