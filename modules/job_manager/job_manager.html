<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LYRN Job Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">

<div class="page-container">
    <header>
        <div>
            <div class="meta-label">LYRN SYSTEM MODULE</div>
            <h1 class="hero-title">Job Manager</h1>
        </div>
    </header>

    <div class="nav-tabs">
        <div class="nav-tab active" onclick="switchTab('jobs')">Jobs</div>
        <div class="nav-tab" onclick="switchTab('scheduler')">Scheduler</div>
        <div class="nav-tab" onclick="switchTab('cycles')">Cycles</div>
    </div>

    <!-- JOBS TAB -->
    <div id="tab-jobs" class="tab-content active main-grid">
        <div class="panel">
            <div class="panel-header">
                <h3 class="panel-title">Jobs</h3>
                <button class="btn-icon" onclick="addNewJob()">+</button>
            </div>
            <div id="jobs-list" class="scroll-list">
                <!-- Job items will be injected here -->
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                <h3 class="panel-title" id="job-editor-title">Job Editor</h3>
                <div class="btn-group">
                    <button class="btn-primary" id="run-job-btn" style="display: none; margin-right: 10px;" onclick="runJob()">Run Job</button>
                    <button class="btn-primary" id="save-job-btn" onclick="saveCurrentJob()">Save</button>
                </div>
            </div>
            <div id="job-editor-container" class="editor-scroll">
                <p style="color: var(--text-dim); padding: 20px; text-align: center;">Select a job to edit.</p>
            </div>
        </div>
    </div>

    <!-- SCHEDULER TAB -->
    <div id="tab-scheduler" class="tab-content full-width-panel">
        <div class="panel" style="flex: 1;">
            <div class="panel-header">
                <div class="btn-group">
                    <button onclick="prevMonth()">&lt;</button>
                    <h3 class="panel-title" id="current-month-label" style="min-width: 150px; text-align: center;">Month Year</h3>
                    <button onclick="nextMonth()">&gt;</button>
                </div>
                <button class="btn-primary" onclick="refreshScheduler()">Refresh</button>
            </div>
            <div class="calendar-grid" id="calendar-grid">
                <!-- Calendar days will be injected here -->
            </div>
        </div>
    </div>

    <!-- CYCLES TAB -->
    <div id="tab-cycles" class="tab-content main-grid">
        <div class="panel">
            <div class="panel-header">
                <h3 class="panel-title">Cycles</h3>
                <button class="btn-icon" onclick="addNewCycle()">+</button>
            </div>
            <div id="cycles-list" class="scroll-list">
                <!-- Cycle items injected here -->
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                <h3 class="panel-title" id="cycle-editor-title">Cycle Editor</h3>
                 <div class="btn-group">
                    <button class="btn-primary" id="save-cycle-btn" onclick="saveCurrentCycle()">Save Cycle</button>
                </div>
            </div>
            <div id="cycle-editor-container" class="editor-scroll">
                <p style="color: var(--text-dim); padding: 20px; text-align: center;">Select a cycle to edit.</p>
            </div>
        </div>
    </div>


    <footer>
        <span>LYRN SYSTEMS // AUTOMATION MODULE</span>
        <div class="footer-right">
            <span>JOB MANAGER // V1.0</span>
            <label class="theme-toggle-inline">
                THEME
                <span class="switch">
                    <input type="checkbox" id="theme-toggle" onchange="toggleTheme(this.checked)">
                    <span class="slider"></span>
                </span>
            </label>
        </div>
    </footer>
</div>

<!-- Scheduler Modal -->
<div id="scheduler-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center;">
    <div class="panel" style="width: 500px; max-height: 80%;">
        <div class="panel-header">
            <h3 class="panel-title" id="scheduler-modal-title">Schedule Job</h3>
            <button class="btn-icon" onclick="closeSchedulerModal()">X</button>
        </div>
        <div class="editor-scroll">
            <div id="day-schedules-list" style="margin-bottom: 20px;"></div>

            <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 20px 0;">

            <h4 class="mono" style="font-size: 12px; margin-bottom: 10px;">Add New Schedule</h4>
            <div class="form-group">
                <label>Job</label>
                <select id="scheduler-job-select"></select>
            </div>
            <div class="form-group">
                <label>Time</label>
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="sched-hour" placeholder="HH" min="1" max="12" style="width: 60px;">
                    <input type="number" id="sched-minute" placeholder="MM" min="0" max="59" style="width: 60px;">
                    <input type="number" id="sched-second" placeholder="SS" min="0" max="59" style="width: 60px;">
                    <select id="sched-ampm" style="width: 70px; background-color: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-color); border-radius: 4px;">
                        <option value="AM">AM</option>
                        <option value="PM">PM</option>
                    </select>
                </div>
            </div>
            <button class="btn-primary" onclick="addSchedule()">Schedule</button>
        </div>
    </div>
</div>

<div id="toast">Operation Successful</div>

<script src="script.js"></script>
</body>
</html>
