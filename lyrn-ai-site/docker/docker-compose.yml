version: "3.9"
services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: lyrn-ai-web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../public:/usr/share/nginx/html:ro
      - ../nginx:/etc/nginx/conf.d:ro
      - ./certs:/etc/letsencrypt:ro
    restart: unless-stopped
